<svg width="680" height="786" viewBox="0 0 680 786" xmlns="http://www.w3.org/2000/svg" role="img">
<title>FERNS reference diagram, all twelve external data providers, with corrected client access paths</title>
<desc>Client references MCP for agent tool calls or references REST directly as any HTTP client, MCP also references REST, and REST references a contained EDP layer holding twelve external data providers, which in turn reference live external upstream APIs over the network.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; }
.arr { stroke: #5F5E5A; fill: none; }
.gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
.gray-text { fill: #444441; }
.coral-fill { fill: #FAECE7; stroke: #993C1D; }
.coral-text { fill: #712B13; }
.purple-fill { fill: #EEEDFE; stroke: #534AB7; }
.purple-text { fill: #3C3489; }
.amber-fill { fill: #FAEEDA; stroke: #854F0B; }
.amber-text { fill: #633806; }
.dashed { fill: none; stroke: #888780; stroke-dasharray: 4 3; }
</style>

<rect class="gray-fill" x="230" y="30" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th gray-text" x="340" y="50" text-anchor="middle" dominant-baseline="central">Client / agent</text>
<text class="ts gray-text" x="340" y="68" text-anchor="middle" dominant-baseline="central">Web app, LLM, or API caller</text>

<path d="M340 86 L340 110 L170 110 L170 170" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="100" text-anchor="start">references MCP (agent tools)</text>
<line x1="340" y1="86" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="200" text-anchor="start">or references REST directly</text>

<rect class="coral-fill" x="70" y="170" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th coral-text" x="170" y="190" text-anchor="middle" dominant-baseline="central">MCP layer</text>
<text class="ts coral-text" x="170" y="208" text-anchor="middle" dominant-baseline="central">For agent tool calls</text>
<path d="M170 226 L170 310 L230 310" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="250" text-anchor="start">MCP also references REST</text>

<rect class="purple-fill" x="230" y="290" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th purple-text" x="340" y="310" text-anchor="middle" dominant-baseline="central">REST layer</text>
<text class="ts purple-text" x="340" y="328" text-anchor="middle" dominant-baseline="central">Envelope + caching + HTTP</text>
<line x1="340" y1="346" x2="340" y2="388" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="460" y="368" text-anchor="start">calls functions from 12 EDPs</text>

<rect class="dashed" x="40" y="388" width="600" height="262" rx="16" stroke-width="1"/>
<text class="th gray-text" x="60" y="410">EDP layer, 12 sources</text>

<rect class="amber-fill" x="50" y="428" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="140" y="448" text-anchor="middle" dominant-baseline="central">BONAP / NAPA</text>
<rect class="amber-fill" x="250" y="428" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="340" y="448" text-anchor="middle" dominant-baseline="central">GBIF</text>
<rect class="amber-fill" x="450" y="428" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="540" y="448" text-anchor="middle" dominant-baseline="central">Go Botany</text>

<rect class="amber-fill" x="50" y="482" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="140" y="502" text-anchor="middle" dominant-baseline="central">Illinois Wildfl.</text>
<rect class="amber-fill" x="250" y="482" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="340" y="502" text-anchor="middle" dominant-baseline="central">Lady Bird Johnson</text>
<rect class="amber-fill" x="450" y="482" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="540" y="502" text-anchor="middle" dominant-baseline="central">Michigan Flora</text>

<rect class="amber-fill" x="50" y="536" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="140" y="556" text-anchor="middle" dominant-baseline="central">Minnesota Wildfl.</text>
<rect class="amber-fill" x="250" y="536" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="340" y="556" text-anchor="middle" dominant-baseline="central">Missouri Plants</text>
<rect class="amber-fill" x="450" y="536" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="540" y="556" text-anchor="middle" dominant-baseline="central">NatureServe</text>

<rect class="amber-fill" x="50" y="590" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="140" y="610" text-anchor="middle" dominant-baseline="central">Prairie Moon</text>
<rect class="amber-fill" x="250" y="590" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="340" y="610" text-anchor="middle" dominant-baseline="central">Universal FQA</text>
<rect class="amber-fill" x="450" y="590" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="th amber-text" x="540" y="610" text-anchor="middle" dominant-baseline="central">USDA Plants</text>

<line x1="340" y1="650" x2="340" y2="690" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="460" y="674" text-anchor="start">calls live HTTP, not files</text>

<rect class="gray-fill" x="230" y="690" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="th gray-text" x="340" y="710" text-anchor="middle" dominant-baseline="central">Live external APIs</text>
<text class="ts gray-text" x="340" y="728" text-anchor="middle" dominant-baseline="central">gbif.org, usda plants, etc.</text>
</svg>

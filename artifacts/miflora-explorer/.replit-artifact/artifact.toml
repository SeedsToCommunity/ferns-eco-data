kind = "web"
previewPath = "/miflora-explorer/"
title = "Michigan Flora Source Explorer"
version = "1.0.0"
id = "artifacts/miflora-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/miflora-explorer/" ]
localPort = 25403

[services.development]
run = "pnpm --filter @workspace/miflora-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/miflora-explorer", "run", "build" ]
publicDir = "artifacts/miflora-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25403"
BASE_PATH = "/miflora-explorer/"

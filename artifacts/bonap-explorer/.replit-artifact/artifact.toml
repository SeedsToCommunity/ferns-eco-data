kind = "web"
previewPath = "/bonap/"
title = "BONAP Source Explorer"
version = "1.0.0"
id = "artifacts/bonap-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/bonap/" ]
localPort = 18641

[services.development]
run = "pnpm --filter @workspace/bonap-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bonap-explorer", "run", "build" ]
publicDir = "artifacts/bonap-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18641"
BASE_PATH = "/bonap/"

kind = "web"
previewPath = "/"
title = "An Ecological Commons"
version = "1.0.0"
id = "artifacts/ecological-commons-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18478

[services.development]
run = "pnpm --filter @workspace/ecological-commons-site run dev"

# Production: built and served by the api-server (Host-header routing).
# The api-server's build.mjs triggers this build with BASE_PATH=/ before
# bundling Express. Static files live at artifacts/ecological-commons-site/dist/public.

[services.env]
PORT = "18478"
BASE_PATH = "/"

kind = "web"
previewPath = "/ferns/"
title = "FERNS Data Layer"
version = "1.0.0"
id = "artifacts/registry-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ferns/" ]
localPort = 23478

[services.development]
run = "pnpm --filter @workspace/registry-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/registry-explorer", "run", "build" ]
publicDir = "artifacts/registry-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23478"
BASE_PATH = "/ferns/"

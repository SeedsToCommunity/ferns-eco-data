kind = "web"
previewPath = "/ferns/"
title = "FERNS Data Layer"
version = "1.0.0"
id = "artifacts/registry-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ferns/" ]
localPort = 23478

[services.development]
run = "pnpm --filter @workspace/registry-explorer run dev"

# Production: built and served by the api-server (Host-header routing).
# The api-server's build.mjs triggers this build with BASE_PATH=/ before
# bundling Express. Static files live at artifacts/registry-explorer/dist/public.
# In production the site is served at the root of data.ecologicalcommons.org,
# so BASE_PATH=/ (set by the build script) -- not /ferns/.

[services.env]
PORT = "23478"
BASE_PATH = "/ferns/"

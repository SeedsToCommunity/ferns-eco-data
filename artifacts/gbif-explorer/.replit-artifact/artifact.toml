kind = "web"
previewPath = "/gbif/"
title = "GBIF Source Explorer"
version = "1.0.0"
id = "artifacts/gbif-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/gbif/" ]
localPort = 19555

[services.development]
run = "pnpm --filter @workspace/gbif-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gbif-explorer", "run", "build" ]
publicDir = "artifacts/gbif-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19555"
BASE_PATH = "/gbif/"

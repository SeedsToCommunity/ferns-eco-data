packages:
  "framer-motion": "For smooth expands/collapses of data panels and UI transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes safely"
  "lucide-react": "Beautiful consistent iconography"
  "date-fns": "For formatting timestamps"

notes:
  - Using generated Orval hooks from @workspace/api-client-react for all API calls
  - API base URL is resolved automatically via the custom fetcher, but UI assumes root-relative /api/
  - No generated images needed; interface relies on crisp typography, icons, and layout for a technical scientific tool aesthetic

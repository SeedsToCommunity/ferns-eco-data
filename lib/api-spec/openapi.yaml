  /miflora/locs_sp:
    get:
      operationId: getMifloraCounties
      tags: [miflora]
      summary: Get county-level occurrence records for a Michigan Flora species by name
      description: >
        Returns county-level occurrence records for all 83 Michigan counties for
        the given species name. Two-step lookup: first calls flora_search_sp?scientific_name={name}
        to resolve the plant_id, then calls locs_sp?id={plant_id} for county data.
        Results are the raw passthrough response from the Michigan Flora county API endpoint.
        Cached permanently (no TTL) — Michigan Flora data does not change;
        use ?refresh=true to force a re-fetch from upstream.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up county records for (e.g. Asclepias tuberosa)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: County occurrence records (check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraCountiesResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/allimage_info:
    get:
      operationId: getMifloraImages
      tags: [miflora]
      summary: Get the full photo gallery for a Michigan Flora species
      description: >
        Returns all images from the Michigan Flora allimage_info endpoint for a given species,
        each enriched with constructed absolute image_url and thumbnail_url fields.
        Two-step lookup: flora_search_sp resolves the plant_id, then allimage_info fetches
        all available photos. Results are cached permanently (no TTL) — Michigan Flora image
        data does not change. Use ?refresh=true to force a re-fetch.
        Image URL formula (reverse-engineered from Michigan Flora frontend):
        Full: https://michiganflora.net/static/species_images/_pid_{plant_id}/{image_id}.jpg
        Thumbnail: https://michiganflora.net/static/species_images/_pid_{plant_id}/thumb_{image_id}.jpg
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Asclepias tuberosa)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Image gallery (check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraImagesResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/flora_search_sp:
    get:
      operationId: getMifloraFloraSearch
      tags: [miflora]
      summary: Look up a Michigan Flora species by scientific name
      description: >
        Mirrors the Michigan Flora flora_search_sp endpoint verbatim. Returns the first
        matching species record for the given scientific name, including plant_id, family,
        native status (na: N=native, A=adventive), C-value, wetland indicator code, physiognomy,
        and common names. The plant_id is required for the spec_text, synonyms, and pimage_info
        endpoints. Cached permanently (no TTL) — use ?refresh=true to force a re-fetch.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Quercus rubra)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Species lookup result (check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraFloraSearchResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/spec_text:
    get:
      operationId: getMifloraSpecText
      tags: [miflora]
      summary: Get botanical description text for a Michigan Flora species by plant_id
      description: >
        Mirrors the Michigan Flora spec_text endpoint. Returns the botanical description
        HTML text for the given plant_id. Use flora_search_sp to resolve a scientific name
        to a plant_id first. Cached permanently (no TTL) — use ?refresh=true to re-fetch.
      parameters:
        - name: id
          in: query
          required: true
          description: Michigan Flora plant_id (positive integer, from flora_search_sp)
          schema:
            type: integer
            minimum: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Botanical description text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraSpecTextResponse"
        "400":
          description: Missing or invalid id parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/synonyms:
    get:
      operationId: getMifloraSynonyms

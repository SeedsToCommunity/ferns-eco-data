      parameters:
        - name: name
          in: query
          required: true
          description: Ecosystem name or keyword to search (e.g. oak savanna, wet prairie)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from NatureServe Explorer
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Ecosystem search results (found or empty — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NatureserveEcosystemsResponse"
        "400":
          description: Missing or invalid name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: NatureServe Explorer API error
          content:

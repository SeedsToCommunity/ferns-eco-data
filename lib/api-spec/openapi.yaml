openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FERNS — Federated Ecological Resource Network System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bonap
    description: BONAP North American Plant Atlas — Distribution Maps
  - name: gbif
    description: GBIF Taxonomic Backbone, Name Reconciliation, and Occurrence Records
  - name: inat
    description: iNaturalist — Observations, Phenology, and Species Appearance
  - name: miflora
    description: Michigan Flora — Vascular Plants of Michigan
  - name: coefficient
    description: Coefficient of Conservatism — Floristic Quality Assessment C-Value Reference
  - name: wetland-indicator-status
    description: Wetland Indicator Status & Coefficient of Wetness — USDA NRCS NWPL Reference
  - name: wucols-water-use
    description: WUCOLS — Water Use Classifications of Landscape Species
  - name: s2c
    description: Seeds to Community Washtenaw — Annual Native Plant Species Availability
  - name: universal-fqa
    description: Universal FQA — Federated Floristic Quality Assessment Databases
  - name: lcscg
    description: Lake County Seed Collection Guides — Native Seed Identification and Collection
  - name: mnfi
    description: Michigan Natural Features Inventory — Natural Community Types and County Element Occurrences
  - name: natureserve
    description: NatureServe Explorer — Species Conservation Status and Ecological Systems
  - name: gobotany
    description: Go Botany — Native Plant Trust Species Pages
  - name: google-images
    description: Google Images — Species Photo Search URLs
  - name: illinois-wildflowers
    description: Illinois Wildflowers — Species Reference Pages
  - name: minnesota-wildflowers
    description: Minnesota Wildflowers — Species Reference Pages
  - name: missouri-plants
    description: Missouri Plants — Species Reference Pages
  - name: prairie-moon
    description: Prairie Moon Nursery — Native Seed and Plant Catalog
  - name: usda-plants
    description: USDA PLANTS Database — Official Federal Plant Data
  - name: lady-bird-johnson
    description: Lady Bird Johnson Wildflower Center — Native Plant Information
  - name: ann-arbor-npn
    description: Ann Arbor Native Plant Nursery — Michigan Native Plant Species Database (nativeplant.com)
  - name: registry
    description: FERNS Service Registry
  - name: trust-groups
    description: FERNS Trust Layer — curated source groups with tiered quality rankings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: >
        Returns server health status wrapped in the FERNS Response Envelope.
        Smoke-test consumer for the FernsEnvelope schema component — the inner
        data payload is a HealthStatus.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthStatus"

  /bonap/map:
    get:
      operationId: getBonapMap
      tags: [bonap]
      summary: Get BONAP distribution map
      description: >
        Returns the BONAP distribution map URL for a given species or genus.
        The map image is served directly from BONAP's server — FERNS returns
        the URL only and never proxies or stores the image.
        Results are cached permanently for found species; 30 days for not-found.
      parameters:
        - name: genus
          in: query
          required: true
          description: >
            Genus name. First letter capitalized, remainder lowercase (e.g. Asclepias).
            The service normalizes to title case before URL construction.
          schema:
            type: string
            minLength: 1
        - name: species
          in: query
          required: false
          description: >
            Species epithet, all lowercase (e.g. tuberosa).
            Required when map_type=county_species or map_type=state_species — omitting species returns 400.
            Subspecies/variety designations are stripped automatically; species_stripped is set true.
          schema:
            type: string
        - name: map_type
          in: query
          required: false
          description: >
            Map type to retrieve. county_species (default) returns a county-level distribution map.
            state_species returns a state/continental-level distribution map.
            Both types require a genus+species pair.
          schema:
            type: string
            enum: [county_species, state_species]
            default: county_species
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from BONAP.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Map lookup complete (found or not found — check the found field). Wrapped in FernsEnvelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BonapMapData"
        "400":
          description: Invalid input (missing genus, missing species, invalid map_type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bonap/metadata:
    get:
      operationId: getBonapMetadata
      tags: [bonap]
      summary: BONAP service metadata
      description: >
        Returns static service identity, data vintage, attribution, licenses and license notes,
        and the full color key array. Use this to populate 'About this data' panels
        in any application displaying BONAP maps.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      responses:
        "200":
          description: Service metadata wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/BonapMetadataData"

  /gbif/species/match:
    get:
      operationId: getGbifMatch
      tags: [gbif]
      summary: Match a scientific name against the GBIF backbone taxonomy
      description: >
        Matches a plant scientific name against the GBIF Backbone Taxonomy.
        Returns the matched taxon's key, canonical name, taxonomic status, match type,
        confidence, full classification, and provenance. Results are cached 30 days for
        hits; 7 days for no-match. A no-match is signaled by matchType=NONE in the
        response data — GBIF always returns HTTP 200. DOUBTFUL status means the name
        exists but taxonomic standing is uncertain; treat as unusable.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to match (e.g. Asclepias tuberosa)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Match result (check matchType — NONE means no match found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifMatchResponse"
        "400":
          description: Missing or invalid name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/occurrence/search:
    get:
      operationId: getGbifOccurrences
      tags: [gbif]
      summary: Search GBIF occurrence records (GBIF native parameters passthrough)
      description: >
        True passthrough to GBIF occurrence/search. Accepts GBIF's native query parameters
        and forwards them verbatim to https://api.gbif.org/v1/occurrence/search. One upstream
        call; GBIF's response (including count, offset, limit, endOfRecords, results) is
        returned in data unchanged. Cached 7 days by MD5 hash of canonicalized query params.
        BREAKING CHANGE from previous version: accepts taxonKey (GBIF native) instead of
        usageKey (old FERNS alias). Geography is now expressed using GBIF native params
        (country, continent, decimalLatitude/Longitude) rather than FERNS geography modes.
      parameters:
        - name: taxonKey
          in: query
          required: false
          description: GBIF backbone taxon key (integer). The GBIF native parameter name for taxon filtering.
          schema:
            type: integer
        - name: country
          in: query
          required: false
          description: >
            ISO 3166-1 alpha-2 country code (e.g. US). Repeatable for multiple countries.
          schema:
            type: string
        - name: continent
          in: query
          required: false
          description: >
            GBIF continent value. One of AFRICA, ANTARCTICA, ASIA, EUROPE,
            NORTH_AMERICA, OCEANIA, SOUTH_AMERICA.
          schema:
            type: string
            enum: [AFRICA, ANTARCTICA, ASIA, EUROPE, NORTH_AMERICA, OCEANIA, SOUTH_AMERICA]
        - name: hasCoordinate
          in: query
          required: false
          description: Filter to records with coordinates (true/false).
          schema:
            type: boolean
        - name: hasGeospatialIssue
          in: query
          required: false
          description: Include/exclude records with geospatial issues (false recommended).
          schema:
            type: boolean
        - name: basisOfRecord
          in: query
          required: false
          description: >
            Filter by basis of record. One of PRESERVED_SPECIMEN, HUMAN_OBSERVATION,
            MACHINE_OBSERVATION, MATERIAL_CITATION, LIVING_SPECIMEN, FOSSIL_SPECIMEN, OCCURRENCE.
          schema:
            type: string
        - name: year
          in: query
          required: false
          description: Filter by year (single value or range, e.g. 2020 or 2010,2020).
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of results to return (GBIF default 20, max 300).
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 300
        - name: offset
          in: query
          required: false
          description: Zero-based offset for pagination.
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: GBIF occurrence search result wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifOccurrencesResponse"
        "502":
          description: GBIF API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/species/search:
    get:
      operationId: getGbifSearch
      tags: [gbif]
      summary: Search GBIF species by common (vernacular) name
      description: >
        Searches GBIF for species whose vernacular names match the query string.
        Returns the verbatim GBIF species/search response (count, offset, limit,
        endOfRecords, results). Cached 7 days per normalized query string.
        Applications are responsible for disambiguation when multiple candidates
        are returned.
      parameters:
        - name: q
          in: query
          required: true
          description: Common name search string (e.g. butterfly milkweed)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: GBIF species search result wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifSearchResponse"
        "400":
          description: Missing query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GBIF API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/species/{usageKey}:
    get:
      operationId: getGbifSpecies
      tags: [gbif]
      summary: Get GBIF species record by usageKey
      description: >
        Returns the verbatim GBIF species record for the given usageKey.
        Mirrors GBIF's GET /v1/species/{usageKey}. Cached 30 days per usageKey.
        Use this to resolve an acceptedUsageKey from a SYNONYM match result.
      parameters:
        - name: usageKey
          in: path
          required: true
          description: GBIF backbone usage key (integer)
          schema:
            type: integer
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: GBIF species record wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifSpeciesResponse"
        "400":
          description: Invalid usageKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GBIF API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/species/{usageKey}/synonyms:
    get:
      operationId: getGbifSpeciesSynonyms
      tags: [gbif]
      summary: Get all taxonomic synonyms for a GBIF taxon
      description: >
        Returns the verbatim GBIF synonyms response for the accepted taxon
        identified by the given usage key. Mirrors GBIF's GET /v1/species/{usageKey}/synonyms.
        Cached 30 days per (usageKey, limit, offset). Pagination is surfaced in the
        envelope pagination field (has_more, total).
      parameters:
        - name: usageKey
          in: path
          required: true
          description: GBIF backbone usage key (integer)
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Number of results to return (1–1000, default 100)
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Zero-based offset for pagination (default 0)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: GBIF synonyms response wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifSynonymsResponse"
        "400":
          description: Invalid usageKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GBIF API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/species/{usageKey}/vernacularNames:
    get:
      operationId: getGbifSpeciesVernacularNames
      tags: [gbif]
      summary: Get all vernacular (common) names for a GBIF taxon
      description: >
        Returns the verbatim GBIF vernacular names response for the taxon
        identified by the given usage key. Mirrors GBIF's GET /v1/species/{usageKey}/vernacularNames.
        Cached 30 days per (usageKey, limit, offset). Pagination is surfaced in the
        envelope pagination field (has_more, total).
      parameters:
        - name: usageKey
          in: path
          required: true
          description: GBIF backbone usage key (integer)
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Number of results to return (1–1000, default 100)
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Zero-based offset for pagination (default 0)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: GBIF vernacular names response wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifVernacularNamesResponse"
        "400":
          description: Invalid usageKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GBIF API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/metadata:
    get:
      operationId: getGbifMetadata
      tags: [gbif]
      summary: GBIF service metadata and controlled vocabularies
      description: >
        Returns service identity, attribution, licenses and license notes, controlled
        vocabulary definitions (basisOfRecord, matchType, taxonomicStatus,
        occurrenceStatus), and the registry entry for the GBIF service.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifMetadataResponse"

  /inat/places/autocomplete:
    get:
      operationId: getInatPlacesAutocomplete
      tags: [inat]
      summary: Look up an iNaturalist place by name
      description: >
        Searches iNaturalist for places matching the query string and returns up to 5
        candidates. The iNaturalist place ID from this response is required to filter
        phenology and observation queries geographically. Place lookups are cached
        permanently — place IDs are stable once assigned. Applications select the correct
        place when multiple candidates are returned.
      parameters:
        - name: q
          in: query
          required: true
          description: Place name to search (e.g. Washtenaw County, Michigan, Sleeping Bear Dunes)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
        - name: provenance_verbosity
          in: query
          required: false
          description: "Controls provenance text: full (default), summary, or none"
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Place lookup complete (found or not found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatPlaceResponse"
        "400":
          description: Missing or empty query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/observations/histogram:
    get:
      operationId: getInatObservationsHistogram
      tags: [inat]
      summary: Passthrough for iNaturalist observations/histogram
      description: >
        Passthrough for iNaturalist's GET /observations/histogram endpoint.
        Returns the raw iNaturalist response containing observation counts by
        calendar month (month_of_year key in results). Cached 7 days keyed by
        taxon_id and sorted set of place_ids.
      parameters:
        - name: taxon_id
          in: query
          required: true
          description: iNaturalist numeric taxon ID (from the species endpoint)
          schema:
            type: integer
        - name: place_id
          in: query
          required: false
          description: >
            One or more iNaturalist place IDs, comma-separated (e.g. 2649 or 2649,986).
            Place IDs from the place lookup endpoint. Sorted ascending when building cache key.
            When omitted, returns global (worldwide) data.
          schema:
            type: string
        - name: term_id
          in: query
          required: false
          description: >
            Controlled annotation term ID to filter by (e.g. 12 for Flowers and Fruits,
            36 for Leaves). When provided, only observations annotated with this term
            are counted. Cache key incorporates this value.
          schema:
            type: integer
        - name: term_value_id
          in: query
          required: false
          description: >
            Controlled annotation value ID to filter by. Requires term_id.
            Cache key incorporates this value.
          schema:
            type: integer
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
        - name: provenance_verbosity
          in: query
          required: false
          description: "Controls provenance text: full (default), summary, or none"
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Raw iNaturalist histogram response in FERNS envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatHistogramResponse"
        "400":
          description: Missing or invalid taxon_id or place_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/observations/popular_field_values:
    get:
      operationId: getInatObservationsPopularFieldValues
      tags: [inat]
      summary: Passthrough for iNaturalist observations/popular_field_values
      description: >
        Passthrough for iNaturalist's GET /observations/popular_field_values endpoint.
        Returns the raw iNaturalist response containing controlled annotation field
        values with per-month counts. Stage labels include Flowers, Flower Buds,
        Fruits or Seeds, No Flowers or Fruits, Green Leaves, Colored Leaves, No Live
        Leaves, Breaking Leaf Buds. Cached 7 days keyed by taxon_id, sorted place_ids,
        and verifiable flag.
      parameters:
        - name: taxon_id
          in: query
          required: true
          description: iNaturalist numeric taxon ID (from the species endpoint)
          schema:
            type: integer
        - name: place_id
          in: query
          required: false
          description: >
            One or more iNaturalist place IDs, comma-separated (e.g. 2649 or 2649,986).
            When omitted, returns global data.
          schema:
            type: string
        - name: verifiable
          in: query
          required: false
          description: >
            If true (default), restricts to verifiable observations. Pass false to
            include all quality grades.
          schema:
            type: boolean
            default: true
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
        - name: provenance_verbosity
          in: query
          required: false
          description: "Controls provenance text: full (default), summary, or none"
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Raw iNaturalist popular_field_values response in FERNS envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatFieldValuesResponse"
        "400":
          description: Missing or invalid taxon_id or place_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/observations:
    get:
      operationId: getInatObservations
      tags: [inat]
      summary: Paged slim observation records from iNaturalist
      description: >
        Calls the iNaturalist API live (no cache) and returns a curated subset of
        observation fields — not the full raw record. Each result includes: id, uri,
        observed_on, quality_grade, taxon_name, common_name, place_guess, location
        (lat,lng), observer login, and the first photo URL + attribution. Callers
        who need the complete record should follow the uri field to iNaturalist directly.
        Supports pagination via page and per_page. The iNaturalist API enforces a hard
        ceiling of 10,000 accessible observations (page × per_page ≤ 10,000).
      parameters:
        - name: taxon_id
          in: query
          required: false
          description: iNaturalist taxon ID to filter by
          schema:
            type: integer
        - name: place_id
          in: query
          required: false
          description: Comma-separated iNaturalist place IDs (e.g. 2649 or 2649,986)
          schema:
            type: string
        - name: quality_grade
          in: query
          required: false
          description: "Filter by quality grade: research, needs_id, or casual"
          schema:
            type: string
            enum: [research, needs_id, casual]
        - name: per_page
          in: query
          required: false
          description: Number of results per page (default 30, max 200)
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 30
        - name: page
          in: query
          required: false
          description: Page number (1-indexed, default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: d1
          in: query
          required: false
          description: Start date filter (YYYY-MM-DD)
          schema:
            type: string
        - name: d2
          in: query
          required: false
          description: End date filter (YYYY-MM-DD)
          schema:
            type: string
        - name: lat
          in: query
          required: false
          description: Center latitude for radius-based geographic filter. Requires lng and radius.
          schema:
            type: number
        - name: lng
          in: query
          required: false
          description: Center longitude for radius-based geographic filter. Requires lat and radius.
          schema:
            type: number
        - name: radius
          in: query
          required: false
          description: Radius in km around the lat/lng center point.
          schema:
            type: number
        - name: nelat
          in: query
          required: false
          description: Northeast corner latitude for bounding box filter.
          schema:
            type: number
        - name: nelng
          in: query
          required: false
          description: Northeast corner longitude for bounding box filter.
          schema:
            type: number
        - name: swlat
          in: query
          required: false
          description: Southwest corner latitude for bounding box filter.
          schema:
            type: number
        - name: swlng
          in: query
          required: false
          description: Southwest corner longitude for bounding box filter.
          schema:
            type: number
        - name: provenance_verbosity
          in: query
          required: false
          description: "Controls provenance text: full (default), summary, or none"
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Paged slim observation records
          content:

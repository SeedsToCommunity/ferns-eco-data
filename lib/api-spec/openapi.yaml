openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FERNS — Federated Ecological Resource Network System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bonap
    description: BONAP North American Plant Atlas — Distribution Maps
  - name: gbif
    description: GBIF Taxonomic Backbone, Name Reconciliation, and Occurrence Records
  - name: inat
    description: iNaturalist — Observations, Phenology, and Species Appearance
  - name: miflora
    description: Michigan Flora — Vascular Plants of Michigan
  - name: coefficient
    description: Coefficient of Conservatism — Floristic Quality Assessment C-Value Reference
  - name: wetland-indicator
    description: Wetland Indicator Status & Coefficient of Wetness — USDA NRCS NWPL Reference
  - name: wucols
    description: WUCOLS — Water Use Classifications of Landscape Species
  - name: s2c
    description: Seeds to Community Washtenaw — Annual Native Plant Species Availability
  - name: universal-fqa
    description: Universal FQA — Federated Floristic Quality Assessment Databases
  - name: registry
    description: FERNS Service Registry
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bonap/map:
    get:
      operationId: getBonapMap
      tags: [bonap]
      summary: Get BONAP distribution map
      description: >
        Returns the BONAP distribution map URL for a given species or genus.
        The map image is served directly from BONAP's server — FERNS returns
        the URL only and never proxies or stores the image.
        Results are cached permanently for found species; 30 days for not-found.
      parameters:
        - name: genus
          in: query
          required: true
          description: >
            Genus name. First letter capitalized, remainder lowercase (e.g. Asclepias).
            The service normalizes to title case before URL construction.
          schema:
            type: string
        - name: species
          in: query
          required: false
          description: >
            Species epithet, all lowercase (e.g. tuberosa).
            Required when map_type=county_species or map_type=state_species — omitting species returns 400.
            Subspecies/variety designations are stripped automatically; species_stripped is set true.
          schema:
            type: string
        - name: map_type
          in: query
          required: false
          description: >
            Map type to retrieve. county_species (default) returns a county-level distribution map.
            state_species returns a state/continental-level distribution map.
            Both types require a genus+species pair.
          schema:
            type: string
            enum: [county_species, state_species]
            default: county_species
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from BONAP.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Map lookup complete (found or not found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonapMapResponse"
        "400":
          description: Invalid input (missing genus, missing species, invalid map_type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bonap/metadata:
    get:
      operationId: getBonapMetadata
      tags: [bonap]
      summary: BONAP service metadata
      description: >
        Returns static service identity, data vintage, attribution, permission status,
        and the full color key array. Use this to populate 'About this data' panels
        in any application displaying BONAP maps.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonapMetadataResponse"

  /gbif/match:
    get:
      operationId: getGbifMatch
      tags: [gbif]
      summary: Match a scientific name against the GBIF backbone taxonomy
      description: >
        Matches a plant scientific name against the GBIF Backbone Taxonomy.
        Returns the matched taxon's key, canonical name, taxonomic status, match type,
        confidence, full classification, and provenance. Results are cached 30 days for
        hits; 7 days for no-match. A no-match is signaled by matchType=NONE in the
        response data — GBIF always returns HTTP 200. DOUBTFUL status means the name
        exists but taxonomic standing is uncertain; treat as unusable.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to match (e.g. Asclepias tuberosa)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Match result (check matchType — NONE means no match found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifMatchResponse"
        "400":
          description: Missing or invalid name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/reconcile:
    get:
      operationId: getGbifReconcile
      tags: [gbif]
      summary: Fetch synonyms and common names for a GBIF taxon
      description: >
        Given a GBIF usageKey, returns all synonyms (all ranks, unfiltered) and
        vernacular names. Synonyms cached 30 days; vernacular names 90 days.
        If a synonym usageKey is passed, the server automatically resolves it to
        the accepted taxon's usageKey before fetching; the resolved_from_synonym_key
        field in the response indicates when this occurred. The resolved accepted
        taxon's synonyms and vernacular names are always returned.
      parameters:
        - name: usageKey
          in: query
          required: true
          description: GBIF backbone usageKey for the accepted taxon
          schema:
            type: integer
      responses:
        "200":
          description: Synonyms and vernacular names for this taxon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifReconcileResponse"
        "400":
          description: Missing or invalid usageKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/occurrences:
    get:
      operationId: getGbifOccurrences
      tags: [gbif]
      summary: Fetch occurrence records for a GBIF taxon with configurable geography
      description: >
        Returns occurrence count and up to 300 recent georeferenced records from GBIF
        for the given taxon. Geography is configurable via three mutually exclusive modes:
        countries (comma-separated ISO codes, OR'd), continent (single GBIF continent
        value), or bbox (minLat,minLon,maxLat,maxLon). All records include
        hasCoordinate=true and hasGeospatialIssue=false filters. Cached 7 days per
        geography combination. Fetch on demand only.
      parameters:
        - name: usageKey
          in: query
          required: true
          description: GBIF backbone usageKey
          schema:
            type: integer
        - name: countries
          in: query
          required: false
          description: >
            Comma-separated ISO 3166-1 alpha-2 country codes (e.g. US,CA,MX).
            Mutually exclusive with continent and bbox.
          schema:
            type: string
        - name: continent
          in: query
          required: false
          description: >
            GBIF continent value. One of AFRICA, ANTARCTICA, ASIA, EUROPE,
            NORTH_AMERICA, OCEANIA, SOUTH_AMERICA. Mutually exclusive with countries and bbox.
          schema:
            type: string
            enum: [AFRICA, ANTARCTICA, ASIA, EUROPE, NORTH_AMERICA, OCEANIA, SOUTH_AMERICA]
        - name: bbox
          in: query
          required: false
          description: >
            Bounding box as minLat,minLon,maxLat,maxLon (decimal degrees, WGS84).
            e.g. 24.396,-125.0,49.384,-66.93 for continental US.
            Mutually exclusive with countries and continent.
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Occurrence count and recent records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifOccurrencesResponse"
        "400":
          description: Missing usageKey or invalid geography parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/search:
    get:
      operationId: getGbifSearch
      tags: [gbif]
      summary: Search GBIF species by common (vernacular) name
      description: >
        Searches GBIF for species whose vernacular names match the query string.
        Returns a ranked list of candidate species. Not cached — query space is
        too wide for meaningful caching. Applications are responsible for
        disambiguation when multiple candidates are returned.
      parameters:
        - name: q
          in: query
          required: true
          description: Common name search string (e.g. butterfly milkweed)
          schema:
            type: string
      responses:
        "200":
          description: List of candidate species matching the common name query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifSearchResponse"
        "400":
          description: Missing query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/metadata:
    get:
      operationId: getGbifMetadata
      tags: [gbif]
      summary: GBIF service metadata and controlled vocabularies
      description: >
        Returns service identity, attribution, permission status, controlled
        vocabulary definitions (basisOfRecord, matchType, taxonomicStatus,
        occurrenceStatus), and the registry entry for the GBIF service.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifMetadataResponse"

  /inat/place:
    get:
      operationId: getInatPlace
      tags: [inat]
      summary: Look up an iNaturalist place by name
      description: >
        Searches iNaturalist for places matching the query string and returns up to 5
        candidates. The iNaturalist place ID from this response is required to filter
        phenology and observation queries geographically. Place lookups are cached
        permanently — place IDs are stable once assigned. Applications select the correct
        place when multiple candidates are returned.
      parameters:
        - name: q
          in: query
          required: true
          description: Place name to search (e.g. Washtenaw County, Michigan, Sleeping Bear Dunes)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Place lookup complete (found or not found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatPlaceResponse"
        "400":
          description: Missing or empty query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/species:
    get:
      operationId: getInatSpecies
      tags: [inat]
      summary: Look up species appearance data from iNaturalist
      description: >
        Given a scientific name, returns what iNaturalist knows about that species:
        a representative photo, a Wikipedia description (raw HTML — strip tags before
        display), common names in all languages, native/introduced status by place,
        global observation count, IUCN conservation status, and the iNaturalist taxon ID
        needed for phenology queries. Two API calls are always required. Results cached
        30 days for found species; 7 days for not-found. match_type indicates whether
        the name matched exactly (exact) or whether the first result was used as a
        fallback (fallback — applications should flag this to users).
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Asclepias tuberosa)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Species lookup complete (found or not found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatSpeciesResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/histogram:
    get:
      operationId: getInatHistogram
      tags: [inat]
      summary: Passthrough for iNaturalist observations/histogram
      description: >
        Passthrough for iNaturalist's GET /observations/histogram endpoint.
        Returns the raw iNaturalist response containing observation counts by
        calendar month (month_of_year key in results). Cached 7 days keyed by
        taxon_id and sorted set of place_ids.
      parameters:
        - name: taxon_id
          in: query
          required: true
          description: iNaturalist numeric taxon ID (from the species endpoint)
          schema:
            type: integer
        - name: place_id
          in: query
          required: false
          description: >
            One or more iNaturalist place IDs, comma-separated (e.g. 2649 or 2649,986).
            Place IDs from the place lookup endpoint. Sorted ascending when building cache key.
            When omitted, returns global (worldwide) data.
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Raw iNaturalist histogram response in FERNS envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatHistogramResponse"
        "400":
          description: Missing or invalid taxon_id or place_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/field-values:
    get:
      operationId: getInatFieldValues
      tags: [inat]
      summary: Passthrough for iNaturalist observations/popular_field_values
      description: >
        Passthrough for iNaturalist's GET /observations/popular_field_values endpoint.
        Returns the raw iNaturalist response containing controlled annotation field
        values with per-month counts. Stage labels include Flowers, Flower Buds,
        Fruits or Seeds, No Flowers or Fruits, Green Leaves, Colored Leaves, No Live
        Leaves, Breaking Leaf Buds. Cached 7 days keyed by taxon_id, sorted place_ids,
        and verifiable flag.
      parameters:
        - name: taxon_id
          in: query
          required: true
          description: iNaturalist numeric taxon ID (from the species endpoint)
          schema:
            type: integer
        - name: place_id
          in: query
          required: false
          description: >
            One or more iNaturalist place IDs, comma-separated (e.g. 2649 or 2649,986).
            When omitted, returns global data.
          schema:
            type: string
        - name: verifiable
          in: query
          required: false
          description: >
            If true (default), restricts to verifiable observations. Pass false to
            include all quality grades.
          schema:
            type: boolean
            default: true
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from iNaturalist
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Raw iNaturalist popular_field_values response in FERNS envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatFieldValuesResponse"
        "400":
          description: Missing or invalid taxon_id or place_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/observations:
    get:
      operationId: getInatObservations
      tags: [inat]
      summary: Get iNaturalist observation URL construction for a species or place
      description: >
        This endpoint does not return or cache observation records. It constructs and
        returns direct URLs that applications use to link to iNaturalist or to query
        the API directly. Individual observation records are live event data that changes
        constantly — FERNS provides URL patterns for applications to fetch them fresh.
        Both taxon_id and place_id are optional. When provided, they are validated and
        incorporated into the returned URLs.
      parameters:
        - name: taxon_id
          in: query
          required: false
          description: iNaturalist taxon ID to incorporate into URLs
          schema:
            type: integer
        - name: place_id
          in: query
          required: false
          description: iNaturalist place ID to incorporate into URLs
          schema:
            type: integer
      responses:
        "200":
          description: Constructed observation URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatObservationsResponse"
        "400":
          description: Invalid taxon_id or place_id (must be positive integers when provided)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inat/metadata:
    get:
      operationId: getInatMetadata
      tags: [inat]
      summary: iNaturalist service metadata
      description: >
        Returns service identity, attribution, permission status, and the full
        registry entry for the iNaturalist service. Use this to populate
        'About this data' panels in any application displaying iNaturalist data.
        Also seeds the iNaturalist entry in the FERNS source registry.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatMetadataResponse"

  /miflora/species:
    get:
      operationId: getMifloraSpecies
      tags: [miflora]
      summary: Look up a species in Michigan Flora
      description: >
        Looks up a vascular plant species in the Michigan Flora REST API.
        Returns the complete passthrough response from Michigan Flora: all search
        records from flora_search_sp, spec_text (taxonomic details and description),
        synonyms, and plant images. Two to four API calls are required per lookup.
        Results are cached permanently (no TTL) — Michigan Flora data does not change;
        use ?refresh=true to force a re-fetch from upstream.
        The pimage_info object in the response is addtively enriched by FERNS with two
        computed fields: image_url and thumbnail_url (constructed from the plant_id and
        image_id using the Michigan Flora static asset URL formula). All other source
        fields are returned unchanged.
        The st field in source records uses the literal string 'NULL' (not JSON null)
        for unknown or absent status — this is a quirk of the Michigan Flora API.
        The c field is always a string; '*' indicates an adventive (non-native) species.
        Scientific names for adventive species are returned ALL-CAPS by the source API.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Asclepias tuberosa)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Species lookup complete (found or not found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraSpeciesResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/counties:
    get:
      operationId: getMifloraCounties
      tags: [miflora]
      summary: Get county-level occurrence records for a Michigan Flora species by name
      description: >
        Returns county-level occurrence records for all 83 Michigan counties for
        the given species name. Two-step lookup: first calls flora_search_sp?scientific_name={name}
        to resolve the plant_id, then calls locs_sp?id={plant_id} for county data.
        Results are the raw passthrough response from the Michigan Flora county API endpoint.
        Cached permanently (no TTL) — Michigan Flora data does not change;
        use ?refresh=true to force a re-fetch from upstream.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up county records for (e.g. Asclepias tuberosa)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: County occurrence records (check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraCountiesResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/images:
    get:
      operationId: getMifloraImages
      tags: [miflora]
      summary: Get the full photo gallery for a Michigan Flora species
      description: >
        Returns all images from the Michigan Flora allimage_info endpoint for a given species,
        each enriched with constructed absolute image_url and thumbnail_url fields.
        Two-step lookup: flora_search_sp resolves the plant_id, then allimage_info fetches
        all available photos. Results are cached permanently (no TTL) — Michigan Flora image
        data does not change. Use ?refresh=true to force a re-fetch.
        Image URL formula (reverse-engineered from Michigan Flora frontend):
        Full: https://michiganflora.net/static/species_images/_pid_{plant_id}/{image_id}.jpg
        Thumbnail: https://michiganflora.net/static/species_images/_pid_{plant_id}/thumb_{image_id}.jpg
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Asclepias tuberosa)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from Michigan Flora API
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Image gallery (check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraImagesResponse"
        "400":
          description: Missing or empty name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Michigan Flora API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /miflora/metadata:
    get:
      operationId: getMifloraMetadata
      tags: [miflora]
      summary: Michigan Flora service metadata
      description: >
        Returns service identity, attribution, permission status, and the full
        registry entry for the Michigan Flora service. Use this to populate
        'About this data' panels in any application displaying Michigan Flora data.
        Also seeds the Michigan Flora entry in the FERNS source registry.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MifloraMetadataResponse"

  /coefficient:
    get:
      operationId: getCoefficientByValue
      tags: [coefficient]
      summary: Look up a Coefficient of Conservatism value
      description: >
        Returns the full ecological definition for a given C-value (0–10) or '*' for non-native species.
        The Coefficient of Conservatism (C-value) is a Floristic Quality Assessment metric developed by
        Swink & Wilhelm (1994) to rate a plant species' fidelity to high-quality natural habitats.
        This is NOT the Coefficient of Wetness (W, -5 to +5) and NOT a Wetland Indicator Status code (OBL/FACW/FAC/FACU/UPL).
      parameters:
        - name: value
          in: query
          required: true
          description: >
            C-value to look up. Must be a string: '0'–'10' for native species, or '*' for non-native/adventive species.
          schema:
            type: string
      responses:
        "200":
          description: C-value definition or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoefficientResponse"
        "400":
          description: Missing or invalid value parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coefficient/all:
    get:
      operationId: getAllCoefficientValues
      tags: [coefficient]
      summary: Get all C-value definitions
      description: >
        Returns all 12 C-value definitions (0–10 and '*') in a single call.
        Useful for populating reference tables or caching locally.
      responses:
        "200":
          description: All C-value definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoefficientAllResponse"

  /coefficient/metadata:
    get:
      operationId: getCoefficientMetadata
      tags: [coefficient]
      summary: Coefficient of Conservatism service metadata
      description: >
        Returns service identity, permission status, and the full registry entry for the
        Coefficient of Conservatism source. Also seeds the registry entry on first call.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyMetadataResponse"

  /wetland-indicator:
    get:
      operationId: getWetlandIndicatorByCode
      tags: [wetland-indicator]
      summary: Look up a Wetland Indicator Status code
      description: >
        Returns the full definition for a given WIS code (OBL, FACW, FAC, FACU, or UPL)
        including its Coefficient of Wetness (W-value) and ecological description.
        WIS codes are defined by the USDA NRCS National Wetland Plant List (NWPL) under USACE authority.
        This is NOT WUCOLS (a nursery irrigation system using VL/L/M/H codes) and NOT the Coefficient of Conservatism (0–10).
      parameters:
        - name: code
          in: query
          required: true
          description: Wetland Indicator Status code to look up (OBL, FACW, FAC, FACU, or UPL). Case-insensitive.
          schema:
            type: string
            enum: [OBL, FACW, FAC, FACU, UPL]
      responses:
        "200":
          description: WIS code definition or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WetlandIndicatorResponse"
        "400":
          description: Missing or invalid code parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wetland-indicator/w:
    get:
      operationId: getWetlandIndicatorByW
      tags: [wetland-indicator]
      summary: Look up a Wetland Indicator Status by Coefficient of Wetness (W-value)
      description: >
        Returns the WIS code and full definition for a given numeric W-value (-5, -3, 0, 3, or 5).
        W-values map directly to WIS codes: OBL=-5, FACW=-3, FAC=0, FACU=+3, UPL=+5.
      parameters:
        - name: value
          in: query
          required: true
          description: Numeric W-value to look up (-5, -3, 0, 3, or 5).
          schema:
            type: integer
            enum: [-5, -3, 0, 3, 5]
      responses:
        "200":
          description: WIS definition for the given W-value, or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WetlandIndicatorResponse"
        "400":
          description: Missing or invalid value parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wetland-indicator/all:
    get:
      operationId: getAllWetlandIndicators
      tags: [wetland-indicator]
      summary: Get all Wetland Indicator Status definitions
      description: >
        Returns all five WIS code definitions (OBL, FACW, FAC, FACU, UPL) with their
        W-values and ecological descriptions in a single call.
      responses:
        "200":
          description: All WIS definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WetlandIndicatorAllResponse"

  /wetland-indicator/metadata:
    get:
      operationId: getWetlandIndicatorMetadata
      tags: [wetland-indicator]
      summary: Wetland Indicator Status service metadata
      description: >
        Returns service identity, permission status, and the full registry entry for the
        Wetland Indicator Status source. Also seeds the registry entry on first call.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyMetadataResponse"

  /wucols:
    get:
      operationId: getWucolsByCode
      tags: [wucols]
      summary: Look up a WUCOLS water use classification code
      description: >
        Returns the full definition for a given WUCOLS code (VL, L, M, or H)
        including ETo percentage range and irrigation description.
        WUCOLS is the UC Cooperative Extension system for rating supplemental irrigation needs
        of landscape plants. This is NOT the Wetland Indicator Status (OBL/FACW/FAC/FACU/UPL),
        which classifies natural wetland habitat occurrence, not irrigation needs.
      parameters:
        - name: code
          in: query
          required: true
          description: WUCOLS water use code to look up (VL, L, M, or H). Case-insensitive.
          schema:
            type: string
            enum: [VL, L, M, H]
      responses:
        "200":
          description: WUCOLS code definition or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WucolsResponse"
        "400":
          description: Missing or invalid code parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wucols/all:
    get:
      operationId: getAllWucols
      tags: [wucols]
      summary: Get all WUCOLS water use classification definitions
      description: >
        Returns all four WUCOLS classification levels (VL, L, M, H) with their
        ETo ranges and descriptions in a single call.
      responses:
        "200":
          description: All WUCOLS definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WucolsAllResponse"

  /wucols/metadata:
    get:
      operationId: getWucolsMetadata
      tags: [wucols]
      summary: WUCOLS service metadata
      description: >
        Returns service identity, permission status, and the full registry entry for the
        WUCOLS source. Also seeds the registry entry on first call.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyMetadataResponse"

  /s2c:
    get:
      operationId: getS2CSpeciesByYear
      tags: [s2c]
      summary: Get species list for a given Seeds to Community Washtenaw program year
      description: >
        Returns the list of botanical names offered by Seeds to Community Washtenaw
        for the specified program year. Program years are labeled by the calendar year
        in which the January–March growing workshops occur.
        Available years: 2023, 2024, 2025, 2026.
        Where tracked, includes neat_and_tidy and sweet_and_simple metadata flags.
      parameters:
        - name: year
          in: query
          required: true
          description: Program year (2023–2026).
          schema:
            type: integer
            enum: [2023, 2024, 2025, 2026]
      responses:
        "200":
          description: Species list for the given year, or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S2CSpeciesResponse"
        "400":
          description: Missing or invalid year parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /s2c/years:
    get:
      operationId: getS2CYears
      tags: [s2c]
      summary: List available Seeds to Community Washtenaw program years
      description: >
        Returns all available program years with species counts and source notes.
        Use this to discover what data is available before querying /s2c?year=.
      responses:
        "200":
          description: Available program years
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/S2CYearsResponse"

  /s2c/metadata:
    get:
      operationId: getS2CMetadata
      tags: [s2c]
      summary: Seeds to Community Washtenaw service metadata
      description: >
        Returns service identity, permission status, and the full registry entry for the
        Seeds to Community Washtenaw source. Also seeds the registry entry on first call.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VocabularyMetadataResponse"

  /v1/sources:
    get:
      operationId: getSourcesIndex
      tags: [registry]
      summary: List all registered FERNS Knowledge Services
      description: >
        Returns a summary entry for every registered FERNS Knowledge Service.
        This is the primary discovery endpoint. Each entry contains enough
        information to make a routing decision without a follow-up call to
        individual /metadata endpoints.
      responses:
        "200":
          description: Registry index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesIndexResponse"

  /universal-fqa/metadata:
    get:
      operationId: getUniversalFqaMetadata
      tags: [universal-fqa]
      summary: Universal FQA service metadata
      description: >
        Returns service identity, attribution, permission status, derivation descriptions,
        and the registry entry for the Universal FQA source.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaMetadataResponse"

  /universal-fqa/databases:
    get:
      operationId: getUniversalFqaDatabases
      tags: [universal-fqa]
      summary: List all Universal FQA regional databases
      description: >
        Returns all 93 regional FQA databases available on universalfqa.org.
        Each entry contains an id, region name, year, and full citation string.
        The region and citation fields together describe geographic scope, ecoregion
        coverage, institutional source, and methodology — read both in full to
        determine relevance for a given project or location.
      responses:
        "200":
          description: List of all regional databases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaDatabasesResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/databases/{id}:
    get:
      operationId: getUniversalFqaDatabase
      tags: [universal-fqa]
      summary: Get a full Universal FQA database with all species records
      description: >
        Returns the complete parsed database for the given ID — all species records
        with named fields, plus the database-level summary metrics (total species,
        native/non-native counts, mean C values). On the first request for a given
        database ID, downloads the database from universalfqa.org and persists it to
        the FERNS PostgreSQL cache. Subsequent requests are served from the cache
        (cache_status: hit). Consumers may retrieve the full database and build their
        own in-memory structures without polling FERNS repeatedly.
      parameters:
        - name: id
          in: path
          required: true
          description: Universal FQA database ID (from the databases list)
          schema:
            type: integer
      responses:
        "200":
          description: Full database with all species records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaDatabaseDetailResponse"
        "400":
          description: Invalid database ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/species:
    get:
      operationId: getUniversalFqaSpecies
      tags: [universal-fqa]
      summary: Look up a species by scientific name in a Universal FQA database
      description: >
        Looks up a species by scientific name within the specified Universal FQA database.
        On the first request for a given database_id, downloads the full database from
        universalfqa.org and stores it in the FERNS PostgreSQL cache. Subsequent lookups
        for the same database_id are served from the cache. Matching is exact and
        case-insensitive.
        Returns all nine source fields: scientific_name, family, acronym, native, c, w,
        physiognomy, duration, common_name.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Lobelia cardinalis)
          schema:
            type: string
        - name: database_id
          in: query
          required: true
          description: >
            Universal FQA database ID. Use /universal-fqa/databases to list all available
            databases with their region and citation strings.
          schema:
            type: integer
      responses:
        "200":
          description: Species lookup result (check found field — false means not in this database)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaSpeciesResponse"
        "400":
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/assessments:
    get:
      operationId: getUniversalFqaAssessments
      tags: [universal-fqa]
      summary: List public site assessments for a Universal FQA database
      description: >
        Returns all publicly shared site assessments for the specified database.
        Each entry contains the assessment id, name, date, site, and practitioner.
        Assessment county and state are only available in the individual assessment
        detail endpoint — the list does not include location fields.
        Michigan 2014 (ID 50) has 4800+ assessments; Michigan 2024 (ID 267) has 400+.
      parameters:
        - name: database_id
          in: query
          required: true
          description: Universal FQA database ID
          schema:
            type: integer
      responses:
        "200":
          description: List of public assessments for this database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaAssessmentsResponse"
        "400":
          description: Missing or invalid database_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/assessment/{id}:
    get:
      operationId: getUniversalFqaAssessment
      tags: [universal-fqa]
      summary: Get a single Universal FQA site assessment in full detail
      description: >
        Returns the full detail for a public site assessment: site name, date,
        city/county/state/country, practitioner, which FQA database was used,
        all computed FQI metrics (Total/Native FQI, Adjusted FQI, Mean C, Mean Wetness,
        species richness, physiognomy breakdown, duration breakdown), and the complete
        observed species list with all nine per-species source fields.
        Returns 404 if the assessment does not exist or is not public.
      parameters:
        - name: id
          in: path
          required: true
          description: Universal FQA assessment ID (from the assessments list)
          schema:
            type: integer
      responses:
        "200":
          description: Full assessment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaAssessmentResponse"
        "404":
          description: Assessment not found or not public
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sources/metadata:
    get:
      operationId: getSourcesMetadata
      tags: [registry]
      summary: Metadata for the FERNS Source Registry service itself
      description: >
        Returns metadata about the registry service itself — its identity,
        descriptions, and its own registry entry. Follows the same envelope
        pattern as all other FERNS /metadata endpoints.
      responses:
        "200":
          description: Registry service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesMetadataResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    FernsProvenance:
      type: object
      description: >
        Provenance block present on every FERNS API response.
        Both derivation fields are required — derivation_summary for general audiences,
        derivation_scientific for researchers who need to evaluate and reproduce the data.
      required:
        - source_id
        - fetched_at
        - method
        - upstream_url
        - derivation_summary
        - derivation_scientific
      properties:
        source_id:
          type: string
          description: Stable identifier for this data source (e.g. bonap-napa)
        fetched_at:
          type: string
          format: date-time
          description: When this record was obtained from the source
        method:
          type: string
          description: "How the data was obtained: api_fetch | blob_import | llm_synthesis"
        upstream_url:
          type: string
          description: Where this data came from (API endpoint, file path, or registry entry)
        derivation_summary:
          type: string
          description: Plain language description readable by a homeowner or community member
        derivation_scientific:
          type: string
          description: >
            Research-grade description: methods, measurement protocols, algorithms,
            citations, and transformations — sufficient for a scientist to evaluate and reproduce
        matched_input:
          type: string
          description: >
            The normalized input that was actually used for this lookup (e.g., the name
            as queried). Present on endpoints that accept a name parameter.

    ColorKeyEntry:
      type: object
      required:
        - code
        - hex_approx
        - hex_is_approximate
        - name
        - description
        - layer
      properties:
        code:
          type: string
          description: Short string identifier for this color entry
        hex_approx:
          type: string
          description: Approximate hex color value derived from visual inspection of BONAP maps
        hex_is_approximate:
          type: boolean
          description: Always true — BONAP does not publish official hex values
        name:
          type: string
          description: BONAP's official status name for this color
        description:
          type: string
          description: Ecological meaning of this color
        layer:
          type: string
          enum: [state_background, county_fill]
          description: Whether this color applies to state backgrounds or county fills

    BonapAttribution:
      type: object
      required:
        - source_name
        - maintainer
        - organization
        - website
        - napa_url
        - citation_napa
        - citation_tdc
        - copyright_notice
      properties:
        source_name:
          type: string
        maintainer:
          type: string
        organization:
          type: string
        website:
          type: string
        napa_url:
          type: string
        citation_napa:
          type: string
        citation_tdc:
          type: string
        copyright_notice:
          type: string

    BonapMapData:
      type: object
      required:
        - map_type_served
        - genus
        - species_stripped
        - status
        - color_key_url
        - color_key_image_url
        - color_key
        - data_vintage
        - permission_granted
        - permission_status
        - attribution
        - cache_status
        - queried_at
      properties:
        map_url:
          type: string
          nullable: true
          description: >
            Direct URL to the PNG image on BONAP's server. Present when status is found.
            Null when not found. Applications display this via an img tag — do not proxy.
        map_type_served:
          type: string
          enum: [county_species, state_species]
        genus:
          type: string
          description: Normalized genus name as used in URL construction
        species:
          type: string
          nullable: true
          description: Normalized species epithet.
        species_stripped:
          type: boolean
          description: True if the caller provided a subspecific epithet that was stripped
        status:
          type: string
          enum: [found, not_found, unverified]
          description: >
            found — URL returned a valid image during cache population.
            not_found — BONAP returned a non-image response for this binomial.
            unverified — URL was returned from cache without re-verification.
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: >
            Direct URL to BONAP's authoritative composite color key GIF image.
            Display this image to show users the complete, pixel-perfect color key.
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
          description: Complete color key for interpreting BONAP maps
        data_vintage:
          type: string
          description: "NAPA maps: December 15, 2014. Color key documentation: February 8, 2024."
        permission_granted:
          type: boolean
          description: >
            Whether FERNS has received written permission from BONAP to reproduce
            and display map materials. Currently false. Applications must surface this field.
        permission_status:
          type: string
          description: >
            Human-readable permission status string. Matches the value from the metadata endpoint.
            Applications should display this when permission_granted is false.
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
        queried_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
          description: >
            Human-readable diagnostic note. Non-null only when status is unverified — explains
            that BONAP's server did not return a definitive response during cache population and
            instructs the caller to retry with ?refresh=true. Null when status is found or not_found.

    BonapMapResponse:
      type: object
      description: Standard FERNS response envelope for BONAP map lookups
      required:
        - source_url
        - found
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
          description: >
            Canonical BONAP page URL for this species or genus.
            Always constructed when possible and returned regardless of whether
            a map was found. Enables 'View on BONAP' links in applications.
        found:
          type: boolean
          description: Whether a BONAP map was found for this query
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/BonapMapData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    BonapMetadataResponse:
      type: object
      required:
        - service_id
        - service_name
        - data_vintage
        - permission_granted
        - permission_status
        - attribution
        - color_key
        - color_key_url
        - color_key_image_url
        - queried_at
      properties:
        service_id:
          type: string
        service_name:
          type: string
        data_vintage:
          type: string
        permission_granted:
          type: boolean
        permission_status:
          type: string
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: >
            Direct URL to BONAP's authoritative composite color key GIF image.
            Display this image to show users the complete, pixel-perfect color key.
        queried_at:
          type: string
          format: date-time

    GbifSynonymRecord:
      type: object
      required:
        - key
        - canonicalName
        - scientificName
        - rank
        - taxonomicStatus
        - nameType
      properties:
        key:
          type: integer
        canonicalName:
          type: string
        scientificName:
          type: string
        rank:
          type: string
        taxonomicStatus:
          type: string
        nameType:
          type: string
        publishedIn:
          type: string
          nullable: true

    GbifVernacularRecord:
      type: object
      required:
        - vernacularName
        - language
      properties:
        vernacularName:
          type: string
        language:
          type: string
        country:
          type: string
          nullable: true
        source:
          type: string
          nullable: true

    GbifOccurrenceRecord:
      type: object
      required:
        - gbifID
        - decimalLatitude
        - decimalLongitude
        - country
        - basisOfRecord
        - occurrenceStatus
        - gbifOccurrenceUrl
      properties:
        gbifID:
          type: string
        decimalLatitude:
          type: number
        decimalLongitude:
          type: number
        country:
          type: string
        stateProvince:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        eventDate:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        basisOfRecord:
          type: string
        institutionCode:
          type: string
          nullable: true
        datasetName:
          type: string
          nullable: true
        coordinateUncertaintyInMeters:
          type: number
          nullable: true
        occurrenceStatus:
          type: string
        gbifOccurrenceUrl:
          type: string

    GbifMatchData:
      type: object
      required:
        - matchType
        - matched_input
        - source_url
      properties:
        usageKey:
          type: integer
          nullable: true
          description: GBIF backbone usageKey. Null when matchType is NONE.
        canonicalName:
          type: string
          nullable: true
        scientificName:
          type: string
          nullable: true
        rank:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          description: ACCEPTED, SYNONYM, or DOUBTFUL
        accepted_usage_key:
          type: integer
          nullable: true
          description: Present when status is SYNONYM. FERNS addition.
        accepted_canonical_name:
          type: string
          nullable: true
          description: Present when status is SYNONYM. FERNS addition.
        confidence:
          type: integer
          nullable: true
        matchType:
          type: string
          enum: [EXACT, FUZZY, HIGHERRANK, NONE]
        kingdom:
          type: string
          nullable: true
        phylum:
          type: string
          nullable: true
        class_:
          type: string
          nullable: true
          description: GBIF 'class' field (JS reserved word renamed to class_)
        order_:
          type: string
          nullable: true
          description: GBIF 'order' field (JS reserved word renamed to order_)
        family:
          type: string
          nullable: true
        genus:
          type: string
          nullable: true
        species:
          type: string
          nullable: true
        kingdomKey:
          type: integer
          nullable: true
        phylumKey:
          type: integer
          nullable: true
        classKey:
          type: integer
          nullable: true
        orderKey:
          type: integer
          nullable: true
        familyKey:
          type: integer
          nullable: true
        genusKey:
          type: integer
          nullable: true
        speciesKey:
          type: integer
          nullable: true
        source_url:
          type: string
          nullable: true
          description: https://www.gbif.org/species/{usageKey} when usageKey is known
        matched_input:
          type: string
        matched_at:
          type: string
          format: date-time
          nullable: true
        cache_status:

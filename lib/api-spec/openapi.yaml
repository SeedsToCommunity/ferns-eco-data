    MifloraSpeciesResponse:
      type: object
      description: >
        FERNS envelope for Michigan Flora species lookup.
        data contains the passthrough response from Michigan Flora with one additive
        enrichment: pimage_info is augmented with image_url and thumbnail_url fields
        constructed from the plant_id and image_id using the Michigan Flora static
        asset URL formula. All other source fields are returned unchanged.
      required:
        - source_url
        - found
        - cache_status
        - queried_at
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
          description: >
            Michigan Flora species page URL (https://michiganflora.net/species/{plant_id}).
            Null when species not found.
        found:
          type: boolean
          description: Whether the species was found in Michigan Flora
        cache_status:
          type: string
          enum: [hit, miss, error]
        queried_at:
          type: string
          format: date-time
        data:
          nullable: true
          description: >
            Passthrough response from Michigan Flora. Contains search_records (array from
            flora_search_sp — may include subspecies and varieties), spec_text (taxonomic
            details and description), synonyms (raw response — either {synonyms:[...]} or
            {message:'No synonyms found'}), and pimage_info (primary image metadata).
            pimage_info is additively enriched by FERNS with image_url and thumbnail_url
            (constructed absolute URLs). All other source fields are returned unchanged.
            The st field uses the literal string 'NULL' for unknown/absent status.
            The c field is always a string; '*' means adventive (non-native).
            Null when found is false.
          type: object
          additionalProperties: true
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    MifloraCountiesResponse:
      type: object
      description: >
        FERNS envelope for Michigan Flora county occurrence data.
        data is the raw passthrough response from the Michigan Flora county endpoint.
      required:
        - source_url
        - found
        - cache_status
        - queried_at
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
          description: Michigan Flora species page URL for this species.
        found:
          type: boolean
          description: Whether county records were found for this species
        cache_status:
          type: string
          enum: [hit, miss, error]
        queried_at:
          type: string
          format: date-time
        data:
          nullable: true
          description: >
            Raw passthrough response from the Michigan Flora county API endpoint.
            Array of county records for all 83 Michigan counties. Each record includes
            county name, FIPS code, and occurrence status. All source fields unchanged.
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    MifloraImageRecord:
      type: object
      description: >
        A single image record from the Michigan Flora allimage_info endpoint,
        enriched with constructed absolute image_url and thumbnail_url fields.
      required:
        - image_id
        - image_url
        - thumbnail_url
      properties:
        image_id:
          description: Michigan Flora internal image ID
          oneOf:
            - type: integer
            - type: string
        image_name:
          type: string
          nullable: true
          description: Short descriptive name for the image (e.g. "flowers", "fruit")
        caption:
          type: string
          nullable: true
          description: Caption text from Michigan Flora for this image
        photographer:
          type: string
          nullable: true
          description: Photographer credit for this image
        image_url:
          type: string
          description: >
            Absolute URL to the full-size image on Michigan Flora's server.
            Constructed as: https://michiganflora.net/static/species_images/_pid_{plant_id}/{image_id}.jpg
        thumbnail_url:
          type: string
          description: >
            Absolute URL to the thumbnail image on Michigan Flora's server.
            Constructed as: https://michiganflora.net/static/species_images/_pid_{plant_id}/thumb_{image_id}.jpg

    MifloraImagesResponse:
      type: object
      description: >
        FERNS envelope for Michigan Flora image gallery.
        data is the array of image records from allimage_info, each enriched with
        constructed absolute image_url and thumbnail_url. Cached permanently (no TTL).
      required:
        - source_url

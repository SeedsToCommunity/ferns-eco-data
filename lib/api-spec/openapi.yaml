    UniversalFqaDatabaseEntry:
      type: object
      required:
        - id
        - region
        - year
        - citation
      properties:
        id:
          type: integer
          description: Universal FQA database ID
        region:
          type: string
          description: Region name as provided by universalfqa.org
        year:
          type: string
          description: Publication year string as provided by universalfqa.org
        citation:
          type: string
          description: >
            Full citation string as provided by universalfqa.org.
            Contains institutional author, year, database name, and sometimes methodology notes.
            Together with region, provides all information needed to select a database.

    UniversalFqaSpeciesRecord:
      type: object
      required:
        - scientific_name
        - family
        - acronym
        - native
        - c
        - w
        - physiognomy
        - duration
        - common_name
      properties:
        scientific_name:
          type: string
          description: Scientific name of the species as listed in this database
        family:
          type: string
          description: Plant family
        acronym:
          type: string
          description: Abbreviated acronym used in this database
        native:
          type: string
          description: >
            Nativity string as provided by the source database.
            Typically "native" or "non-native" but exact values depend on the database.
        c:
          nullable: true
          description: >
            Coefficient of Conservatism (C-value) for this species in this database.
            Integer 0–10 for native species; null for non-native or unassigned species.
            Some databases use string representations. Always check the source database citation
            for the methodology used to assign C-values.
        w:
          nullable: true
          description: >
            Coefficient of Wetness (W-value). Numeric, -5 (obligate wetland) to +5 (obligate upland).
            Null if not assigned.
        physiognomy:
          type: string
          description: Plant physiognomic type (e.g. Forb, Shrub, Tree, Grass, Sedge, Rush, Fern, Bryophyte, Vine)
        duration:
          type: string
          description: Life duration (e.g. Annual, Perennial, Biennial)
        common_name:
          type: string
          description: Common name in the source database


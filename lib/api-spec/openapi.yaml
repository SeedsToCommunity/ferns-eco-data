  /inat/observations/species_counts:
    get:
      operationId: getInatObservationsSpeciesCounts
      tags: [inat]
      summary: Passthrough for iNaturalist observations/species_counts
      description: >
        Live passthrough for iNaturalist's GET /observations/species_counts endpoint.
        Returns species ranked by observation count. Supports filters for place,
        quality grade, iconic taxon, nativity, phenology annotations, month window,
        and geographic constraints (place_id, lat/lng radius, or bounding box).
        No cache — every call is live. Results are wrapped in the standard FERNS
        provenance envelope.
      parameters:
        - name: place_id
          in: query
          required: false
          description: Comma-separated iNaturalist place IDs (e.g. 2649 or 2649,986)
          schema:
            type: string
        - name: quality_grade
          in: query
          required: false
          description: "Filter by quality grade: research, needs_id, or casual"
          schema:
            type: string
            enum: [research, needs_id, casual]
        - name: iconic_taxon_name
          in: query
          required: false
          description: "Filter to this iconic taxon group (e.g. Plantae, Aves, Fungi, Mammalia, Reptilia, Amphibia, Actinopterygii, Mollusca, Arachnida, Insecta, Animalia)"
          schema:
            type: string
        - name: native
          in: query
          required: false
          description: Only include taxa native to the observed location
          schema:
            type: boolean
        - name: introduced
          in: query
          required: false
          description: Only include taxa introduced at the observed location
          schema:
            type: boolean
        - name: term_id
          in: query
          required: false
          description: "Controlled annotation term ID (e.g. 12 for Flowers and Fruits)"
          schema:
            type: integer
        - name: term_value_id
          in: query
          required: false
          description: Controlled annotation value ID. Requires term_id.
          schema:
            type: integer
        - name: month
          in: query
          required: false
          description: "Comma-separated month numbers to filter by (e.g. 4,5,6 for Apr–Jun)"
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: Number of results (default 500, max 500)
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
        - name: page
          in: query
          required: false
          description: Page number (1-indexed, default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: d1
          in: query
          required: false
          description: Start date filter (YYYY-MM-DD)
          schema:
            type: string
        - name: d2
          in: query
          required: false
          description: End date filter (YYYY-MM-DD)
          schema:
            type: string
        - name: lat
          in: query
          required: false
          description: Center latitude for radius-based geographic filter. Requires lng and radius.
          schema:
            type: number
        - name: lng
          in: query
          required: false
          description: Center longitude for radius-based geographic filter. Requires lat and radius.
          schema:
            type: number
        - name: radius
          in: query
          required: false
          description: Radius in km around the lat/lng center point.
          schema:
            type: number
        - name: nelat
          in: query
          required: false
          description: Northeast corner latitude for bounding box filter.
          schema:
            type: number
        - name: nelng
          in: query
          required: false
          description: Northeast corner longitude for bounding box filter.
          schema:
            type: number
        - name: swlat
          in: query
          required: false
          description: Southwest corner latitude for bounding box filter.
          schema:
            type: number
        - name: swlng
          in: query
          required: false
          description: Southwest corner longitude for bounding box filter.
          schema:
            type: number
        - name: provenance_verbosity
          in: query
          required: false
          description: "Controls provenance text: full (default), summary, or none"
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Raw iNaturalist species_counts response in FERNS envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InatSpeciesCountsResponse"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: iNaturalist API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"


          in: query
          required: true
          description: Program year (2023–2026).
          schema:
            type: integer
            enum: [2023, 2024, 2025, 2026]
      responses:
        "200":
          description: Species list for the given year, wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/S2CSpeciesData"
        "400":

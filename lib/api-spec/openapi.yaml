openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FERNS — Federated Ecological Resource Network System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bonap
    description: BONAP North American Plant Atlas — Distribution Maps
  - name: gbif
    description: GBIF Taxonomic Backbone, Name Reconciliation, and Occurrence Records
  - name: registry
    description: FERNS Service Registry
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bonap/map:
    get:
      operationId: getBonapMap
      tags: [bonap]
      summary: Get BONAP distribution map
      description: >
        Returns the BONAP distribution map URL for a given species or genus.
        The map image is served directly from BONAP's server — FERNS returns
        the URL only and never proxies or stores the image.
        Results are cached permanently for found species; 30 days for not-found.
      parameters:
        - name: genus
          in: query
          required: true
          description: >
            Genus name. First letter capitalized, remainder lowercase (e.g. Asclepias).
            The service normalizes to title case before URL construction.
          schema:
            type: string
        - name: species
          in: query
          required: false
          description: >
            Species epithet, all lowercase (e.g. tuberosa).
            Required when map_type=county_species or map_type=state_species — omitting species returns 400.
            Subspecies/variety designations are stripped automatically; species_stripped is set true.
          schema:
            type: string
        - name: map_type
          in: query
          required: false
          description: >
            Map type to retrieve. county_species (default) returns a county-level distribution map.
            state_species returns a state/continental-level distribution map.
            Both types require a genus+species pair.
          schema:
            type: string
            enum: [county_species, state_species]
            default: county_species
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from BONAP.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Map lookup complete (found or not found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonapMapResponse"
        "400":
          description: Invalid input (missing genus, missing species, invalid map_type)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bonap/metadata:
    get:
      operationId: getBonapMetadata
      tags: [bonap]
      summary: BONAP service metadata
      description: >
        Returns static service identity, data vintage, attribution, permission status,
        and the full color key array. Use this to populate 'About this data' panels
        in any application displaying BONAP maps.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonapMetadataResponse"

  /gbif/match:
    get:
      operationId: getGbifMatch
      tags: [gbif]
      summary: Match a scientific name against the GBIF backbone taxonomy
      description: >
        Matches a plant scientific name against the GBIF Backbone Taxonomy.
        Returns the matched taxon's key, canonical name, taxonomic status, match type,
        confidence, full classification, and provenance. Results are cached 30 days for
        hits; 7 days for no-match. A no-match is signaled by matchType=NONE in the
        response data — GBIF always returns HTTP 200. DOUBTFUL status means the name
        exists but taxonomic standing is uncertain; treat as unusable.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to match (e.g. Asclepias tuberosa)
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Match result (check matchType — NONE means no match found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifMatchResponse"
        "400":
          description: Missing or invalid name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/reconcile:
    get:
      operationId: getGbifReconcile
      tags: [gbif]
      summary: Fetch synonyms and common names for a GBIF taxon
      description: >
        Given a GBIF usageKey, returns all synonyms (all ranks, unfiltered) and
        vernacular names. Synonyms cached 30 days; vernacular names 90 days.
        If a synonym usageKey is passed, the server automatically resolves it to
        the accepted taxon's usageKey before fetching; the resolved_from_synonym_key
        field in the response indicates when this occurred. The resolved accepted
        taxon's synonyms and vernacular names are always returned.
      parameters:
        - name: usageKey
          in: query
          required: true
          description: GBIF backbone usageKey for the accepted taxon
          schema:
            type: integer
      responses:
        "200":
          description: Synonyms and vernacular names for this taxon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifReconcileResponse"
        "400":
          description: Missing or invalid usageKey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/occurrences:
    get:
      operationId: getGbifOccurrences
      tags: [gbif]
      summary: Fetch occurrence records for a GBIF taxon with configurable geography
      description: >
        Returns occurrence count and up to 300 recent georeferenced records from GBIF
        for the given taxon. Geography is configurable via three mutually exclusive modes:
        countries (comma-separated ISO codes, OR'd), continent (single GBIF continent
        value), or bbox (minLat,minLon,maxLat,maxLon). All records include
        hasCoordinate=true and hasGeospatialIssue=false filters. Cached 7 days per
        geography combination. Fetch on demand only.
      parameters:
        - name: usageKey
          in: query
          required: true
          description: GBIF backbone usageKey
          schema:
            type: integer
        - name: countries
          in: query
          required: false
          description: >
            Comma-separated ISO 3166-1 alpha-2 country codes (e.g. US,CA,MX).
            Mutually exclusive with continent and bbox.
          schema:
            type: string
        - name: continent
          in: query
          required: false
          description: >
            GBIF continent value. One of AFRICA, ANTARCTICA, ASIA, EUROPE,
            NORTH_AMERICA, OCEANIA, SOUTH_AMERICA. Mutually exclusive with countries and bbox.
          schema:
            type: string
            enum: [AFRICA, ANTARCTICA, ASIA, EUROPE, NORTH_AMERICA, OCEANIA, SOUTH_AMERICA]
        - name: bbox
          in: query
          required: false
          description: >
            Bounding box as minLat,minLon,maxLat,maxLon (decimal degrees, WGS84).
            e.g. 24.396,-125.0,49.384,-66.93 for continental US.
            Mutually exclusive with countries and continent.
          schema:
            type: string
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from GBIF
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Occurrence count and recent records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifOccurrencesResponse"
        "400":
          description: Missing usageKey or invalid geography parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/search:
    get:
      operationId: getGbifSearch
      tags: [gbif]
      summary: Search GBIF species by common (vernacular) name
      description: >
        Searches GBIF for species whose vernacular names match the query string.
        Returns a ranked list of candidate species. Not cached — query space is
        too wide for meaningful caching. Applications are responsible for
        disambiguation when multiple candidates are returned.
      parameters:
        - name: q
          in: query
          required: true
          description: Common name search string (e.g. butterfly milkweed)
          schema:
            type: string
      responses:
        "200":
          description: List of candidate species matching the common name query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifSearchResponse"
        "400":
          description: Missing query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gbif/metadata:
    get:
      operationId: getGbifMetadata
      tags: [gbif]
      summary: GBIF service metadata and controlled vocabularies
      description: >
        Returns service identity, attribution, permission status, controlled
        vocabulary definitions (basisOfRecord, matchType, taxonomicStatus,
        occurrenceStatus), and the registry entry for the GBIF service.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifMetadataResponse"

  /v1/sources:
    get:
      operationId: getSourcesIndex
      tags: [registry]
      summary: List all registered FERNS Knowledge Services
      description: >
        Returns a summary entry for every registered FERNS Knowledge Service.
        This is the primary discovery endpoint. Each entry contains enough
        information to make a routing decision without a follow-up call to
        individual /metadata endpoints.
      responses:
        "200":
          description: Registry index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesIndexResponse"

  /v1/sources/metadata:
    get:
      operationId: getSourcesMetadata
      tags: [registry]
      summary: Metadata for the FERNS Source Registry service itself
      description: >
        Returns metadata about the registry service itself — its identity,
        descriptions, and its own registry entry. Follows the same envelope
        pattern as all other FERNS /metadata endpoints.
      responses:
        "200":
          description: Registry service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesMetadataResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    FernsProvenance:
      type: object
      description: >
        Provenance block present on every FERNS API response.
        Both derivation fields are required — derivation_summary for general audiences,
        derivation_scientific for researchers who need to evaluate and reproduce the data.
      required:
        - source_id
        - fetched_at
        - method
        - upstream_url
        - derivation_summary
        - derivation_scientific
      properties:
        source_id:
          type: string
          description: Stable identifier for this data source (e.g. bonap-napa)
        fetched_at:
          type: string
          format: date-time
          description: When this record was obtained from the source
        method:
          type: string
          description: "How the data was obtained: api_fetch | blob_import | llm_synthesis"
        upstream_url:
          type: string
          description: Where this data came from (API endpoint, file path, or registry entry)
        derivation_summary:
          type: string
          description: Plain language description readable by a homeowner or community member
        derivation_scientific:
          type: string
          description: >
            Research-grade description: methods, measurement protocols, algorithms,
            citations, and transformations — sufficient for a scientist to evaluate and reproduce

    ColorKeyEntry:
      type: object
      required:
        - code
        - hex_approx
        - hex_is_approximate
        - name
        - description
        - layer
      properties:
        code:
          type: string
          description: Short string identifier for this color entry
        hex_approx:
          type: string
          description: Approximate hex color value derived from visual inspection of BONAP maps
        hex_is_approximate:
          type: boolean
          description: Always true — BONAP does not publish official hex values
        name:
          type: string
          description: BONAP's official status name for this color
        description:
          type: string
          description: Ecological meaning of this color
        layer:
          type: string
          enum: [state_background, county_fill]
          description: Whether this color applies to state backgrounds or county fills

    BonapAttribution:
      type: object
      required:
        - source_name
        - maintainer
        - organization
        - website
        - napa_url
        - citation_napa
        - citation_tdc
        - copyright_notice
      properties:
        source_name:
          type: string
        maintainer:
          type: string
        organization:
          type: string
        website:
          type: string
        napa_url:
          type: string
        citation_napa:
          type: string
        citation_tdc:
          type: string
        copyright_notice:
          type: string

    BonapMapData:
      type: object
      required:
        - map_type_served
        - genus
        - species_stripped
        - status
        - color_key_url
        - color_key_image_url
        - color_key
        - data_vintage
        - permission_granted
        - permission_status
        - attribution
        - cache_status
        - queried_at
      properties:
        map_url:
          type: string
          nullable: true
          description: >
            Direct URL to the PNG image on BONAP's server. Present when status is found.
            Null when not found. Applications display this via an img tag — do not proxy.
        map_type_served:
          type: string
          enum: [county_species, state_species]
        genus:
          type: string
          description: Normalized genus name as used in URL construction
        species:
          type: string
          nullable: true
          description: Normalized species epithet.
        species_stripped:
          type: boolean
          description: True if the caller provided a subspecific epithet that was stripped
        status:
          type: string
          enum: [found, not_found, unverified]
          description: >
            found — URL returned a valid image during cache population.
            not_found — BONAP returned a non-image response for this binomial.
            unverified — URL was returned from cache without re-verification.
        tdc_taxon_id:
          type: integer
          nullable: true
          description: BONAP internal taxon ID if known. Enables future TDC-based lookups.
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: >
            Direct URL to BONAP's authoritative composite color key GIF image.
            Display this image to show users the complete, pixel-perfect color key.
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
          description: Complete color key for interpreting BONAP maps
        data_vintage:
          type: string
          description: "NAPA maps: December 15, 2014. Color key documentation: February 8, 2024."
        permission_granted:
          type: boolean
          description: >
            Whether FERNS has received written permission from BONAP to reproduce
            and display map materials. Currently false. Applications must surface this field.
        permission_status:
          type: string
          description: >
            Human-readable permission status string. Matches the value from the metadata endpoint.
            Applications should display this when permission_granted is false.
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
        queried_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
          description: >
            Human-readable note attached to this response. Present when FERNS cannot
            fully verify the map URL. Null for standard county_species or state_species responses.

    BonapMapResponse:
      type: object
      description: Standard FERNS response envelope for BONAP map lookups
      required:
        - source_url
        - found
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
          description: >
            Canonical BONAP page URL for this species or genus.
            Always constructed when possible and returned regardless of whether
            a map was found. Enables 'View on BONAP' links in applications.
        found:
          type: boolean
          description: Whether a BONAP map was found for this query
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/BonapMapData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    BonapMetadataResponse:
      type: object
      required:
        - service_id
        - service_name
        - data_vintage
        - permission_granted
        - permission_status
        - attribution
        - color_key
        - color_key_url
        - color_key_image_url
        - queried_at
      properties:
        service_id:
          type: string
        service_name:
          type: string
        data_vintage:
          type: string
        permission_granted:
          type: boolean
        permission_status:
          type: string
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: >
            Direct URL to BONAP's authoritative composite color key GIF image.
            Display this image to show users the complete, pixel-perfect color key.
        queried_at:
          type: string
          format: date-time

    GbifSynonymRecord:
      type: object
      required:
        - key
        - canonicalName
        - scientificName
        - rank
        - taxonomicStatus
        - nameType
      properties:
        key:
          type: integer
        canonicalName:
          type: string
        scientificName:
          type: string
        rank:
          type: string
        taxonomicStatus:
          type: string
        nameType:
          type: string
        publishedIn:
          type: string
          nullable: true

    GbifVernacularRecord:
      type: object
      required:
        - vernacularName
        - language
      properties:
        vernacularName:
          type: string
        language:
          type: string
        country:
          type: string
          nullable: true
        source:
          type: string
          nullable: true

    GbifOccurrenceRecord:
      type: object
      required:
        - gbifID
        - decimalLatitude
        - decimalLongitude
        - country
        - basisOfRecord
        - occurrenceStatus
        - gbifOccurrenceUrl
      properties:
        gbifID:
          type: string
        decimalLatitude:
          type: number
        decimalLongitude:
          type: number
        country:
          type: string
        stateProvince:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        eventDate:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        basisOfRecord:
          type: string
        institutionCode:
          type: string
          nullable: true
        datasetName:
          type: string
          nullable: true
        coordinateUncertaintyInMeters:
          type: number
          nullable: true
        occurrenceStatus:
          type: string
        gbifOccurrenceUrl:
          type: string

    GbifMatchData:
      type: object
      required:
        - match_type
        - matched_input
        - source_url
      properties:
        usage_key:
          type: integer
          nullable: true
          description: GBIF backbone usageKey. Null when matchType is NONE.
        canonical_name:
          type: string
          nullable: true
        scientific_name:
          type: string
          nullable: true
        rank:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          description: ACCEPTED, SYNONYM, or DOUBTFUL
        accepted_usage_key:
          type: integer
          nullable: true
          description: Present when status is SYNONYM
        accepted_canonical_name:
          type: string
          nullable: true
          description: Present when status is SYNONYM
        confidence:
          type: integer
          nullable: true
        match_type:
          type: string
          enum: [EXACT, FUZZY, HIGHERRANK, NONE]
        kingdom:
          type: string
          nullable: true
        phylum:
          type: string
          nullable: true
        class_:
          type: string
          nullable: true
        order_:
          type: string
          nullable: true
        family:
          type: string
          nullable: true
        genus:
          type: string
          nullable: true
        species:
          type: string
          nullable: true
        source_url:
          type: string
          nullable: true
          description: https://www.gbif.org/species/{usageKey} when usageKey is known
        matched_input:
          type: string
        matched_at:
          type: string
          format: date-time
          nullable: true
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
          nullable: true

    GbifMatchResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GbifMatchData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifReconcileData:
      type: object
      required:
        - usage_key
        - synonyms
        - synonym_count
        - vernacular_names
        - vernacular_name_count
        - synonyms_fetched_at
        - vernacular_fetched_at
      properties:
        usage_key:
          type: integer
        resolved_from_synonym_key:
          type: integer
          nullable: true
          description: The original synonym usageKey if auto-resolution occurred, null otherwise
        synonyms:
          type: array
          items:
            $ref: "#/components/schemas/GbifSynonymRecord"
        synonym_count:
          type: integer
        vernacular_names:
          type: array
          items:
            $ref: "#/components/schemas/GbifVernacularRecord"
        vernacular_name_primary:
          type: string
          nullable: true
        vernacular_name_count:
          type: integer

        synonyms_fetched_at:
          type: string
          format: date-time
        vernacular_fetched_at:
          type: string
          format: date-time

    GbifReconcileResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GbifReconcileData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifOccurrencesData:
      type: object
      required:
        - usage_key
        - geography_mode
        - geography_params
        - occurrence_count
        - recent_occurrences
        - occurrence_last_fetched
        - source_url
      properties:
        usage_key:
          type: integer
        geography_mode:
          type: string
          enum: [countries, continent, bbox]
        geography_params:
          type: string
          description: Serialized geography parameters for display
        occurrence_count:
          type: integer
        occurrence_count_us:
          type: integer
          nullable: true
        recent_occurrences:
          type: array
          items:
            $ref: "#/components/schemas/GbifOccurrenceRecord"
        occurrence_last_fetched:
          type: string
          format: date-time
        source_url:
          type: string
          nullable: true
          description: GBIF occurrence search URL for this taxon and geography
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
          nullable: true

    GbifOccurrencesResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GbifOccurrencesData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifSearchCandidate:
      type: object
      required:
        - usageKey
        - canonicalName
        - scientificName
        - rank
        - status
      properties:
        usageKey:
          type: integer
        canonicalName:
          type: string
        scientificName:
          type: string
        rank:
          type: string
        status:
          type: string
        family:
          type: string
          nullable: true
        vernacularName:
          type: string
          nullable: true
        source_url:
          type: string

    GbifSearchResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          type: object
          nullable: true
          properties:
            query:
              type: string
            candidates:
              type: array
              items:
                $ref: "#/components/schemas/GbifSearchCandidate"
            count:
              type: integer
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifVocabularyEntry:
      type: object
      required:
        - code
        - label
        - description
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string

    GbifMetadataResponse:
      type: object
      required:
        - service_id
        - service_name
        - permission_granted
        - permission_status
        - attribution
        - vocabularies
        - queried_at
        - provenance
      properties:
        service_id:
          type: string
        service_name:
          type: string
        permission_granted:
          type: boolean
        permission_status:
          type: string
        attribution:
          type: object
          properties:
            source_name:
              type: string
            website:
              type: string
            license:
              type: string
            citation:
              type: string
            api_base_url:
              type: string
        vocabularies:
          type: object
          properties:
            basisOfRecord:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
            matchType:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
            taxonomicStatus:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
            occurrenceStatus:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
        registry_entry:
          type: object
          description: Full registry entry for this GBIF service source
          properties:
            source_id:
              type: string
            name:
              type: string
            knowledge_type:
              type: string
            status:
              type: string
            description:
              type: string
            input_summary:
              type: string
            output_summary:
              type: string
            dependencies:
              type: array
              items:
                type: string
            update_frequency:
              type: string
            known_limitations:
              type: string
            metadata_url:
              type: string
            explorer_url:
              type: string
        queried_at:
          type: string
          format: date-time
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    SourceSummary:
      type: object
      required:
        - source_id
        - name
        - knowledge_type
        - status
        - description
        - input_summary
        - output_summary
        - dependencies
        - update_frequency
        - known_limitations
        - metadata_url
        - explorer_url
      properties:
        source_id:
          type: string
          description: Stable identifier for this service (e.g. bonap-napa, gbif)
        name:
          type: string
          description: Human-readable service name
        knowledge_type:
          type: string
          description: "source_wrapper | derived_synthesis | aggregation | system"
        status:
          type: string
          description: "live | draft | deprecated"
        description:
          type: string
          description: Plain-English description readable by a homeowner or community member
        input_summary:
          type: string
          description: What you send to query this service
        output_summary:
          type: string
          description: What you get back
        dependencies:
          type: array
          items:
            type: string
          description: source_ids this service depends on
        update_frequency:
          type: string
          description: How often the underlying data changes (e.g. live, annual, static)
        known_limitations:
          type: string
          description: Brief honest statement of gaps and caveats
        metadata_url:
          type: string
          description: Link to this service's full /metadata endpoint
        explorer_url:
          type: string
          description: Link to this service's Source Explorer UI

    SourcesIndexResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
        found:
          type: boolean
        data:
          type: object
          required:
            - sources
          properties:
            sources:
              type: array
              items:
                $ref: "#/components/schemas/SourceSummary"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    SourcesMetadataResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
        found:
          type: boolean
        data:
          $ref: "#/components/schemas/SourceSummary"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

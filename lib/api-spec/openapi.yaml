    SpeciesTextResponse:
      type: object
      description: >
        Response shape for species page text scraping endpoints. Returned by
        /gobotany/species-text, /illinois-wildflowers/species-text,
        /minnesota-wildflowers/species-text, /missouri-plants/species-text,
        and /prairie-moon/species-text.
      required:
        - found
        - queried_at
        - cache_status
      properties:
        found:
          type: boolean
          description: True if the species page was found and text was extracted.
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
          description: The API endpoint URL that served this response.
        cache_status:
          type: string
          enum: [hit, miss, not_in_species_list]
          description: >
            "hit" — returned from cache. "miss" — live scrape performed and cached.
            "not_in_species_list" — species URL not in the imported species list;
            scrape skipped.
        fetch_error:
          type: string
          description: >
            Present only when a transient upstream error (network failure,
            timeout, 5xx) prevented the scrape. The result was NOT cached
            in this case and the next call will retry the live request.
        scraped_at:
          type: string
          format: date-time
          description: Timestamp of when the text was originally scraped.
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true
          type: object
          description: Present when found=true. Null when not found.
          properties:
            species:
              type: string
              description: The species name as queried.
            url:
              type: string
              description: The page URL that was scraped.
            sections:
              type: object
              nullable: true
              additionalProperties:
                type: string
              description: >
                Labeled prose sections extracted from the page (e.g.
                Description, Cultivation, Facts, Habitat). Keys are section
                names, values are plain text content.
            full_text:
              type: string
              nullable: true
              description: >
                All sections concatenated as Label-colon-text blocks, separated by double newlines.

    LbjUrlCheckData:
      type: object
      description: Data payload for /lady-bird-johnson FernsEnvelope data field.
      properties:
        usda_symbol:
          type: string
          description: USDA Plants symbol (uppercased).
        profile_url:
          type: string
          nullable: true
          description: Direct profile URL when found; null when not_found or unverified.
        status:
          type: string
          enum: [found, not_found, unverified]
          description: >
            "found" — HTTP 200 returned. "not_found" — 3xx redirect or 4xx returned.
            "unverified" — 5xx or network error; result not cached.
        http_status:
          type: integer
          nullable: true
          description: HTTP status code returned by the verification request.
        validation_method:
          type: string
          description: Always "http_get_manual_redirect" for this endpoint.
        verified_at:
          type: string
          format: date-time
          nullable: true
          description: >
            Timestamp when the verification HTTP request was made.
            Null when status is "unverified" (network/5xx error prevented caching).

    LbjUrlCheckResponse:
      description: >
        Legacy envelope schema kept for backwards-compat reference. Route response now uses allOf:FernsEnvelope.
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LbjUrlCheckData"

    LbjSpeciesTextData:
      type: object
      description: Data payload for /lady-bird-johnson/species-text FernsEnvelope data field.
      properties:
        usda_symbol:
          type: string
          description: USDA Plants symbol (uppercased).
        url:
          type: string
          description: The profile URL that was scraped.
        sections:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: >
            Labeled prose sections extracted from the page (h3-delimited).
            "Find Seeds or Plants" and "Mr. Smarty Plants says" sections are excluded.
        full_text:
          type: string
          nullable: true
          description: All sections concatenated as Label-colon-text blocks, separated by double newlines.

    LbjSpeciesTextResponse:
      description: >
        Legacy envelope schema kept for backwards-compat reference. Route response now uses allOf:FernsEnvelope.
        cache_status ("hit"/"miss"), queried_at, and source_url are in provenance per FERNS envelope contract v1.
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LbjSpeciesTextData"

    BotanicalWebRefResponse:
      type: object
      description: >
        Standard response shape for botanical web reference source lookups
        (gobotany, google-images, illinois-wildflowers, minnesota-wildflowers,
        missouri-plants, prairie-moon, usda-plants).
      required:
        - found
        - queried_at
      properties:
        found:
          type: boolean
          description: >
            True if a direct species page URL was resolved. False for sources
            that cannot resolve a profile URL (usda-plants),
            which return a search_url instead.
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true
          type: object
          description: Present when found=true (or when a search_url is returned). Null when not found.
          properties:
            species:
              type: string
              description: The species name as queried
            url:
              type: string
              nullable: true
              description: Direct species page URL. Null when only a search URL is available.
            search_url:
              type: string
              description: >
                Search URL when a direct profile URL cannot be constructed
                (usda-plants). Present instead of url for these sources.
            validation_method:
              type: string
              description: "How the URL was validated: http_get | species_list_lookup | direct_construction | not_resolvable"
            note:
              type: string
              description: Explanatory note when validation_method is not_resolvable

    BotanicalWebRefMetadataResponse:
      type: object
      description: Service metadata response for botanical web reference sources.
      required:
        - service_id
        - service_name
      properties:
        service_id:
          type: string
        service_name:
          type: string
        licenses:
          type: array
          items:
            type: string
        license_notes:
          type: string
        url_strategy:
          type: string
          description: "URL construction strategy: direct_construction | sitemap_scrape | species_list_scrape"
        url_pattern:
          type: string
          description: URL template pattern used for direct construction sources
        validation:
          type: string
          description: "Validation method for constructed URLs: http_get | none | not_resolvable"
        indexed_species_count:
          type: integer
          description: Number of species indexed in FERNS's local database (scrape-based sources only)
        registry_entry:
          type: object
          additionalProperties: true
        queried_at:
          type: string
          format: date-time
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    UsdaPlantsNativeStatus:
      type: object
      description: Nativity status for a US region.
      properties:
        Region:
          type: string
          description: "Region code (L48, AK, HI, PR, VI, CAN, GU, MP, SPM, UM)"
        Status:
          type: string
          description: "N=Native, I=Introduced"
        Type:
          type: string
          description: "Native or Introduced"

    UsdaPlantsSpeciesData:
      type: object
      properties:
        symbol:
          type: string
          nullable: true
        canonical_name:
          type: string
          nullable: true
        common_name:
          type: string
          nullable: true
        rank:
          type: string
          nullable: true
        usda_id:
          type: integer
          nullable: true
        native_statuses:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/UsdaPlantsNativeStatus"
        wetland_data:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        legal_statuses:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        durations:
          type: array
          nullable: true
          items:
            type: string
        growth_habits:
          type: array
          nullable: true
          items:
            type: string
        group:
          type: string
          nullable: true
        ancestors:
          type: array
          nullable: true
          description: Taxonomy hierarchy from Kingdom to parent rank
          items:
            type: object
            additionalProperties: true
        synonyms:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
        fact_sheet_urls:
          type: array
          items:
            type: string
        plant_guide_urls:
          type: array
          items:
            type: string
        other_common_names:
          type: array
          nullable: true
          items:
            type: string
        profile_image_filename:
          type: string
          nullable: true

    UsdaPlantsSpeciesResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UsdaPlantsSpeciesData"

    UsdaPlantsProfileResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                symbol:
                  type: string
                profile:
                  type: object
                  description: Raw PlantProfile object from the USDA PLANTS API
                  additionalProperties: true

    UsdaPlantsSearchResult:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        accepted_symbol:
          type: string
          nullable: true
        is_synonym:
          type: boolean
        scientific_name:
          type: string
          description: Scientific name with HTML italic tags
        scientific_name_without_author:
          type: string
          nullable: true
        common_name:
          type: string
          nullable: true
        family_name:
          type: string
          nullable: true
        rank_id:
          type: integer
          nullable: true
        num_images:
          type: integer
        profile_image_filename:
          type: string
          nullable: true
        fact_sheet_urls:
          type: array
          items:
            type: string
        plant_guide_urls:
          type: array
          items:
            type: string
        legal_statuses:
          type: array
          items:
            type: object
            additionalProperties: true
        wetland_data:
          type: array
          items:
            type: object
            additionalProperties: true

    UsdaPlantsSearchResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                total:
                  type: integer
                results:
                  type: array
                  items:
                    $ref: "#/components/schemas/UsdaPlantsSearchResult"

    UsdaPlantsMetadataResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
              description: Registry entry descriptive payload for the USDA PLANTS source

    TrustGroupSummary:
      type: object
      required:
        - group_id
        - slug
        - name
        - created_at
        - updated_at
      properties:
        group_id:
          type: string
          format: uuid
          description: Stable internal identifier for the trust group
        slug:
          type: string
          description: URL-safe unique identifier (e.g. default, research-partners)
        name:
          type: string
          description: Human-readable display name
        owner_email:
          type: string
          nullable: true
          description: Email of the group owner, if set
        geographic_region:
          type: string
          nullable: true
          description: Geographic scope of the trust group, if set
        domain:
          type: string
          nullable: true
          description: Subject-matter domain of the trust group, if set
        description:
          type: string
          nullable: true
          description: Free-text description of the group's purpose
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TrustTierSummary:
      type: object
      required:
        - tier_id
        - position
        - name
        - created_at
      properties:
        tier_id:
          type: string
          format: uuid
        position:
          type: integer
          description: Ascending sort order; lower = higher trust priority
        name:
          type: string
          description: Display name (e.g. Primary, Secondary, Tertiary)
        created_at:
          type: string
          format: date-time

    TrustTierWithSources:
      type: object
      required:
        - tier_id
        - position
        - name
        - sources
      properties:
        tier_id:
          type: string
          format: uuid
        position:
          type: integer
          description: Ascending sort order; lower = higher trust priority
        name:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceSummary"

    TrustGroupsListResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
        found:
          type: boolean
        data:
          type: object
          required:
            - groups
          properties:
            groups:
              type: array
              items:
                $ref: "#/components/schemas/TrustGroupSummary"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    TrustGroupDetailResponse:
      type: object
      required:
        - source_url
        - found
        - provenance
      properties:
        source_url:
          type: string
        found:
          type: boolean
        message:
          type: string
          description: Present when found is false
        data:
          nullable: true
          type: object
          required:
            - group
            - tiers
          properties:
            group:
              $ref: "#/components/schemas/TrustGroupSummary"
            tiers:
              type: array
              items:
                $ref: "#/components/schemas/TrustTierSummary"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    TrustGroupSourcesResponse:
      type: object
      required:
        - source_url
        - found
        - provenance
      properties:
        source_url:
          type: string
        found:
          type: boolean
        message:
          type: string
          description: Present when found is false
        data:
          nullable: true
          type: object
          required:
            - group
            - tiers
          properties:
            group:
              type: object
              required:
                - group_id
                - slug
                - name
              properties:
                group_id:
                  type: string
                  format: uuid
                slug:
                  type: string
                name:
                  type: string
            tiers:
              type: array
              items:
                $ref: "#/components/schemas/TrustTierWithSources"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    NpnImage:
      type: object
      description: A single image associated with an NPN species record.
      required: [position, url, caption, kind]
      properties:
        position:
          type: integer
          description: 1-based position of this image in the species gallery
        url:
          type: string
          description: Cloudinary CDN URL (or original nativeplant.com URL as fallback)
        caption:
          type: string
          description: Image caption from the source page (may be empty string)
        kind:
          type: string
          enum: [photograph, drawing]
          description: >
            Inferred from caption text: "pen & ink" or "drawing" → drawing; else photograph

    NpnSpeciesRecord:
      type: object
      description: A single species record from The Native Plant Nursery database.
      required: [acronym, latin_name, common_name, images, source_url, scraped_at]
      properties:
        acronym:
          type: string
          description: Primary key — 4–7 character code (e.g. LOBSIP). Carex uses CX prefix.
        latin_name:
          type: string
        latin_synonym_greg:
          type: string
          nullable: true
          description: >
            Greg Vaclavek's Latin synonym. Known quirk: GENAND has "Closed Gentian"
            (a common name) in this field.
        common_name:
          type: string
          description: Raw common name string (may contain ; and , separators)
        light:
          type: string
          nullable: true
        moisture:
          type: string
          nullable: true
        height:
          type: string
          nullable: true
        flowering_time:
          type: string
          nullable: true
        habitat:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        range_michigan:
          type: array
          items:
            type: string
          nullable: true
          description: County or region strings within Michigan
        npn_price_sizes:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/NpnImage"
        source_url:
          type: string
        scraped_at:
          type: string
          format: date-time

    NpnSpeciesResponse:
      type: object
      description: FERNS envelope for single NPN species lookup (found=true, HTTP 200).
      required: [found, provenance]
      properties:
        found:
          type: boolean
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true
          $ref: "#/components/schemas/NpnSpeciesRecord"

    NpnNotFoundResponse:
      type: object
      description: >
        FERNS envelope when a name key is not in the alias index (HTTP 404). found=false.
      required: [found, provenance]
      properties:
        found:
          type: boolean
          example: false
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true

    NpnSpeciesBulkResponse:
      type: object
      description: FERNS envelope for bulk NPN species list.
      required: [found, provenance, data]
      properties:
        found:
          type: boolean
          description: false when the table is empty (import not yet run)
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          type: object
          required: [species_count, species]
          properties:
            species_count:
              type: integer
            species:
              type: array
              items:
                $ref: "#/components/schemas/NpnSpeciesRecord"

    NpnNameGroup:
      type: object
      description: Name group entry for a single NPN species.
      required: [acronym, latin_name, common_names, all_accepted_keys]
      properties:
        acronym:
          type: string
        latin_name:
          type: string
        latin_synonym_greg:
          type: string
          nullable: true
        common_names:
          type: array
          items:
            type: string
          description: Parsed segments (split on ; and , from common_name)
        all_accepted_keys:
          type: array
          items:
            type: string
          description: All lowercase aliases for this species

    NpnNamesResponse:
      type: object
      description: FERNS envelope for NPN name groups (cross-source reconciliation).
      required: [found, provenance, data]
      properties:
        found:
          type: boolean
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          type: object
          required: [species_count, name_groups]
          properties:
            species_count:
              type: integer
            name_groups:
              type: array
              items:
                $ref: "#/components/schemas/NpnNameGroup"

    GoogleImagesData:
      type: object
      description: Data payload for the /google-images endpoint (FernsEnvelope data field).
      required: [species, url]
      properties:
        species:
          type: string
          description: Scientific name as provided in the query.
        url:
          type: string
          description: Constructed Google Images search URL for the species.

    SourceMetadataData:
      type: object
      description: >
        Data payload for any source's /metadata endpoint (FernsEnvelope data field).
        Contains the source's registry descriptive payload.
      required: [source_id, name, knowledge_type, status, description]
      properties:
        source_id:
          type: string
        name:
          type: string
        knowledge_type:
          type: string
        status:
          type: string
        description:
          type: string
        input_summary:
          type: string
        output_summary:
          type: string
        dependencies:
          type: array
          items:
            type: string
        update_frequency:
          type: string
        known_limitations:
          type: string
        metadata_url:
          type: string
        licenses:
          type: array
          items:
            type: string
        license_notes:
          type: string
        general_summary:
          type: string
        technical_details:
          type: string

    NpnMetadataData:
      type: object
      description: Data payload for /ann-arbor-npn/metadata FernsEnvelope data field.
      properties:
        service_id:
          type: string
          example: ann-arbor-npn
        service_name:
          type: string
        licenses:
          type: array
          items:
            type: string
        license_notes:
          type: string
        species_count:
          type: integer
        registry_entry:
          type: object
          additionalProperties: true

    NpnMetadataResponse:
      description: >
        Legacy envelope schema kept for backwards-compat reference. Route response now uses allOf:FernsEnvelope.
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/NpnMetadataData"

    get:
      operationId: getAnnArborNpnMetadata
      tags: [ann-arbor-npn]
      summary: Ann Arbor Native Plant Nursery service metadata
      description: >
        Returns service identity, current species count, licenses and license notes, and the full
        registry entry for The Native Plant Nursery (nativeplant.com, Ann Arbor, MI —
        Greg Vaclavek). Includes known limitations, update frequency, and technical details.
      responses:
        "200":
          description: NPN service metadata wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NpnMetadataData"

  /ann-arbor-npn/species-list:
    get:
      operationId: getAnnArborNpnSpeciesList
      tags: [ann-arbor-npn]
      summary: All Ann Arbor Native Plant Nursery species (bulk)
      description: >
        Returns all ~130 species from The Native Plant Nursery database ordered by Latin
        name. Each record includes ecological attributes (light, moisture, height, flowering
        time, habitat, range within Michigan), nursery pricing, and Cloudinary image URLs
        with captions and kind (photograph / drawing). Returns an empty list if the import
        has not yet been run.
      parameters:
        - name: provenance_verbosity
          in: query
          required: false
          description: Controls provenance verbosity in the response ("full", "summary", or "none")
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: NPN bulk species list wrapped in FernsEnvelope (found=false with empty array before import)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [species_count, species]
                        properties:
                          species_count:
                            type: integer
                          species:
                            type: array
                            items:
                              $ref: "#/components/schemas/NpnSpeciesRecord"

  /ann-arbor-npn/species/{key}:
    get:
      operationId: getAnnArborNpnSpeciesByKey
      tags: [ann-arbor-npn]
      summary: Single NPN species by acronym, Latin name, synonym, or common name
      description: >
        Resolves any NPN name flavor to a species record via the npn_name_aliases index
        (case-insensitive). Accepted inputs: acronym (e.g. LOBSIP), Latin name
        (e.g. "Lobelia spicata"), Greg's Latin synonym, or any common name
        (semicolon/comma-delimited common names are each indexed separately).
        Returns HTTP 404 with found=false when the key does not appear in the alias index.
        The alias index is built during import; 404 is also returned before import has run.
      parameters:
        - name: key
          in: path
          required: true
          description: Acronym, Latin name, synonym, or common name (any capitalisation)
          schema:
            type: string
            minLength: 1
        - name: provenance_verbosity
          in: query
          required: false
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: NPN species record wrapped in FernsEnvelope (found=true)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NpnSpeciesRecord"
        "400":
          description: Empty key parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Name not found in alias index wrapped in FernsEnvelope (found=false)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"

  /ann-arbor-npn/name-groups:
    get:
      operationId: getAnnArborNpnNameGroups
      tags: [ann-arbor-npn]
      summary: NPN name groups — all species with every accepted lookup key
      description: >
        Returns all 130 NPN species as name groups served from the in-memory IDP.
        Each entry contains acronym, latin_name, latin_synonym_greg (nullable),
        common_names (string array parsed from the semicolon/comma-delimited common_name field),
        and all_accepted_keys (flat array of every lowercase alias that resolves to this species).
        Designed for cross-source name reconciliation against GBIF, USDA PLANTS, or iNaturalist.
        Replaces the former /ann-arbor-npn/alias-index endpoint.
      parameters:
        - name: provenance_verbosity
          in: query
          required: false
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: NPN alias index wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [species_count, name_groups]
                        properties:
                          species_count:
                            type: integer
                          name_groups:
                            type: array
                            items:
                              $ref: "#/components/schemas/NpnNameGroup"

  /ann-arbor-npn/species/{key}/source-url:
    get:
      operationId: getAnnArborNpnSpeciesSourceUrl
      tags: [ann-arbor-npn]
      summary: Per-species nativeplant.com URL for a given key
      description: >
        Returns the nativeplant.com source URL for the species identified by the given key.
        Accepts the same name flavors as /ann-arbor-npn/species/{key}: acronym, Latin name,
        Latin synonym, or any common name. Returns 404 with found=false when not found.
        Data is served from the in-memory IDP snapshot.
      parameters:
        - name: key
          in: path
          required: true
          description: Acronym, Latin name, synonym, or common name (any capitalisation)
          schema:
            type: string
            minLength: 1
        - name: provenance_verbosity
          in: query
          required: false
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Source URL wrapped in FernsEnvelope (found=true)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [acronym, source_url]
                        properties:
                          acronym:
                            type: string
                          source_url:
                            type: string
        "400":
          description: Empty key parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Name not found in alias index wrapped in FernsEnvelope (found=false)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"

  /ann-arbor-npn/documentation:
    get:
      operationId: getAnnArborNpnDocumentation
      tags: [ann-arbor-npn]
      summary: Source documentation for the Ann Arbor Native Plant Nursery dataset
      description: >
        Returns the full source documentation for the Ann Arbor NPN dataset as Markdown in
        data.markdown. Covers: Greg Vaclavek's background, dataset contents, field descriptions,
        Michigan range vocabulary (SE/SW/NL/UP), alias index construction, Cloudinary image storage,
        and the migration from DB-backed scrape to static in-memory snapshot.
        Always returns 200 with found=true — the documentation file is static and always present.
      parameters:
        - name: provenance_verbosity
          in: query
          required: false
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Documentation markdown wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [markdown]
                        properties:
                          markdown:
                            type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    FernsProvenance:
      type: object
      description: >
        Provenance block present on every FERNS API response.
        Identity fields (source_id, fetched_at, method, upstream_url) are always present.
        Text fields (general_summary, technical_details) are conditionally present
        based on the provenance_verbosity query parameter (full|summary|none).
      required:
        - source_id
        - fetched_at
        - method
        - upstream_url
      properties:
        source_id:
          type: string
          description: Stable identifier for this data source (e.g. bonap-napa)
        fetched_at:
          type: string
          format: date-time
          description: When this record was obtained from the source
        method:
          type: string
          description: "How the data was obtained: api_fetch | blob_import | llm_synthesis"
        upstream_url:
          type: string
          description: Where this data came from (API endpoint, file path, or registry entry)
        general_summary:
          type: string
          description: Plain language description readable by a homeowner or community member
        technical_details:
          type: string
          description: >
            Research-grade description: methods, measurement protocols, algorithms,
            citations, and transformations — sufficient for a scientist to evaluate and reproduce
        matched_input:
          type: string
          description: >
            The normalized input that was actually used for this lookup (e.g., the name
            as queried). Present on endpoints that accept a name parameter.

    EnvelopeMethod:
      type: string
      enum: [api_fetch, cache_hit, computed]
      description: >
        How FERNS obtained the data for this response.
        Coupled with cache_status — only specific pairs are valid:
        api_fetch+miss, cache_hit+hit, cache_hit+stale, computed+bypass, computed+hit.
        See replit.md "Refinement #7 — method and cache_status are coupled".

    EnvelopeCacheStatus:
      type: string
      enum: [hit, miss, stale, bypass]
      description: >
        Cache outcome for this response.
        Coupled with method — see EnvelopeMethod description for valid pairs.

    EnvelopeSourceType:
      type: string
      enum: [in-memory, pure-algorithm, single-source-proxy, multi-source-algorithm]
      description: >
        Classification of the FERNS source kind. Mirrors the SOURCE_KINDS enum
        in @workspace/api-envelope. Determines how the envelope is filled —
        see replit.md "How each source kind fills the envelope".

    Pagination:
      type: object
      description: >
        Pagination metadata for responses that represent one page of a larger set.
        Present (object) when the response could continue; null when the response
        is inherently whole. See replit.md "Top-level field definitions".
      required:
        - has_more
        - next
        - total
      properties:
        has_more:
          type: boolean
          description: True if more pages exist beyond this one.
        next:
          type: string
          nullable: true
          description: Opaque cursor or token for fetching the next page; null if no next page.
        total:
          type: integer
          nullable: true
          description: Total record count across all pages, if known; null when not provided by the source.

    Provenance:
      type: object
      description: >
        Per-response provenance — what FERNS did to obtain this payload.
        Holds only FERNS-produced facts about the act of fetching. Source-produced
        content lives in the envelope's data field. See replit.md
        "FERNS Response Envelope Contract v1 — Provenance field definitions".
      required:
        - source_id
        - source_url
        - method
        - cache_status
        - queried_at
        - derived_from
        - license
        - rights
      properties:
        source_id:
          type: string
          description: Stable identifier of the registered FERNS source (e.g. bonap-napa).
        source_url:
          type: string
          format: uri
          nullable: true
          description: >
            Absolute upstream URL FERNS contacted. Null for in-memory or pure-algorithm
            sources that contact no external system. On a cache hit, this is the
            original fetch URL (refinement #1) — not null.
        method:
          $ref: "#/components/schemas/EnvelopeMethod"
        cache_status:
          $ref: "#/components/schemas/EnvelopeCacheStatus"
        queried_at:
          type: string
          format: date-time
          description: When FERNS performed this lookup (UTC ISO-8601).
        derived_from:
          type: array
          nullable: true
          description: >
            List of contributing sources for multi-source-algorithm responses.
            Null for all other source kinds.
          items:
            type: object
            required:
              - source_id
              - queried_at
            properties:
              source_id:
                type: string
              queried_at:
                type: string
                format: date-time
        license:
          type: string
          description: License URI for the source data, or the literal string "unknown".
        rights:
          type: string
          description: Rights statement / attribution for the source.

    FernsEnvelope:
      type: object
      description: >
        The FERNS Response Envelope Contract v1 — every endpoint must produce
        this shape. The envelope holds only what is true of FERNS's act of
        obtaining the data; the data field holds only what the source produced.
        Authoritative contract: replit.md "FERNS Response Envelope Contract v1".
        Note: OpenAPI cannot express the full method/cache_status coupling table
        nor the source-kind-specific source_url/derived_from rules — those are
        enforced at runtime by the @workspace/api-envelope builder and by the
        forthcoming structural audit.
      required:
        - found
        - permission_granted
        - pagination
        - provenance
        - data
      properties:
        found:
          type: boolean
          description: >
            Did the source have the thing that was asked for? True = data is present.
            False = the lookup ran correctly but the source holds no record (honest absence,
            not an error).
        permission_granted:
          type: boolean
          description: Is the consumer cleared to use this data? Always present, per-endpoint.
        pagination:
          oneOf:
            - $ref: "#/components/schemas/Pagination"
            - type: "null"
          description: Pagination metadata, or null when the response is inherently whole.
        provenance:
          $ref: "#/components/schemas/Provenance"
        data:
          description: Verbatim payload from the source. Shape varies per endpoint.

    ColorKeyEntry:
      type: object
      required:
        - code
        - hex_approx
        - hex_is_approximate
        - name
        - description
        - layer
      properties:
        code:
          type: string
          description: Short string identifier for this color entry
        hex_approx:
          type: string
          description: Approximate hex color value derived from visual inspection of BONAP maps
        hex_is_approximate:
          type: boolean
          description: Always true — BONAP does not publish official hex values
        name:
          type: string
          description: BONAP's official status name for this color
        description:
          type: string
          description: Ecological meaning of this color
        layer:
          type: string
          enum: [state_background, county_fill]
          description: Whether this color applies to state backgrounds or county fills

    BonapAttribution:
      type: object
      required:
        - source_name
        - maintainer
        - organization
        - website
        - napa_url
        - citation_napa
        - citation_tdc
        - copyright_notice
      properties:
        source_name:
          type: string
        maintainer:
          type: string
        organization:
          type: string
        website:
          type: string
        napa_url:
          type: string
        citation_napa:
          type: string
        citation_tdc:
          type: string
        copyright_notice:
          type: string

    BonapMapData:
      type: object
      required:
        - map_type_served
        - genus
        - species_stripped
        - status
      properties:
        map_url:
          type: string
          nullable: true
          description: >
            Direct URL to the PNG image on BONAP's server. Present when status is found.
            Null when not found. Applications display this via an img tag — do not proxy.
        map_type_served:
          type: string
          enum: [county_species, state_species]
        genus:
          type: string
          description: Normalized genus name as used in URL construction
        species:
          type: string
          nullable: true
          description: Normalized species epithet.
        species_stripped:
          type: boolean
          description: True if the caller provided a subspecific epithet that was stripped
        status:
          type: string
          enum: [found, not_found, unverified]
          description: >
            found — URL returned a valid image during cache population.
            not_found — BONAP returned a non-image response for this binomial.
            unverified — URL was returned from cache without re-verification.

    BonapMapResponse:
      type: object
      description: Standard FERNS response envelope for BONAP map lookups
      required:
        - found
        - provenance
      properties:
        found:
          type: boolean
          description: Whether a BONAP map was found for this query
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/BonapMapData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    BonapMetadataData:
      type: object
      description: Data payload returned in the /bonap/metadata FernsEnvelope data field.
      properties:
        service_id:
          type: string
        service_name:
          type: string
        data_vintage:
          type: string
        licenses:
          type: array
          items:
            type: string
        license_notes:
          type: string
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: Direct URL to BONAP's authoritative composite color key GIF image.
        registry_entry:
          type: object
          additionalProperties: true

    BonapMetadataResponse:
      description: >
        Legacy envelope schema kept for backwards-compat reference. Route response now uses allOf:FernsEnvelope.
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/BonapMetadataData"

    GbifOccurrenceRecord:
      type: object
      required:
        - gbifID
        - decimalLatitude
        - decimalLongitude
        - country
        - basisOfRecord
        - occurrenceStatus
        - gbifOccurrenceUrl
      properties:
        gbifID:
          type: string
        decimalLatitude:
          type: number
        decimalLongitude:
          type: number
        country:
          type: string
        stateProvince:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        eventDate:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        basisOfRecord:
          type: string
        institutionCode:
          type: string
          nullable: true
        datasetName:
          type: string
          nullable: true
        coordinateUncertaintyInMeters:
          type: number
          nullable: true
        occurrenceStatus:
          type: string
        gbifOccurrenceUrl:
          type: string

    GbifMatchData:
      type: object
      additionalProperties: true
      description: >
        Verbatim GBIF species/match upstream response. matchType is NONE when no match
        was found. usageKey is absent or null when matchType is NONE.
        GBIF always returns HTTP 200 regardless of match outcome.

    GbifSynonymRecord:
      type: object
      additionalProperties: true
      properties:
        key:
          type: integer
        canonicalName:
          type: string
        scientificName:
          type: string
        rank:
          type: string
        taxonomicStatus:
          type: string
        nameType:
          type: string
        publishedIn:
          type: string
          nullable: true

    GbifSynonymsData:
      type: object
      additionalProperties: true
      description: >
        Verbatim GBIF species/{usageKey}/synonyms upstream response.
        Includes count, offset, limit, endOfRecords, and results array.

    GbifSynonymsResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifSynonymsData"

    GbifVernacularRecord:
      type: object
      additionalProperties: true
      properties:
        vernacularName:
          type: string
        language:
          type: string
        country:
          type: string
          nullable: true
        source:
          type: string
          nullable: true

    GbifVernacularNamesData:
      type: object
      additionalProperties: true
      description: >
        Verbatim GBIF species/{usageKey}/vernacularNames upstream response.
        Includes count, offset, limit, endOfRecords, and results array.

    GbifVernacularNamesResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifVernacularNamesData"

    GbifMatchResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifMatchData"

    GbifOccurrencesData:
      type: object
      additionalProperties: true
      description: >
        Verbatim GBIF occurrence/search upstream response.
        Includes count, offset, limit, endOfRecords, and results array.

    GbifOccurrencesResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifOccurrencesData"

    GbifSearchData:
      type: object
      additionalProperties: true
      description: >
        Verbatim GBIF species/search upstream response filtered to vernacular name matches.
        Includes count, offset, limit, endOfRecords, and results array.

    GbifSearchResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifSearchData"

    GbifSpeciesData:
      type: object
      additionalProperties: true
      description: >
        Verbatim GBIF species/{usageKey} upstream response.

    GbifSpeciesResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifSpeciesData"

    GbifVocabularyEntry:
      type: object
      required:
        - code
        - label
        - description
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string

    GbifMetadataData:
      type: object
      properties:
        description:
          type: string
        general_summary:
          type: string
        technical_details:
          type: string
        licenses:
          type: array
          items:
            type: string
        license_notes:
          type: string
        attribution:
          type: object
          properties:
            source_name:
              type: string
            website:
              type: string
            license:
              type: string
            citation:
              type: string
            api_base_url:
              type: string
        vocabularies:
          type: object
          properties:
            basisOfRecord:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
            matchType:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
            taxonomicStatus:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
            occurrenceStatus:
              type: array
              items:
                $ref: "#/components/schemas/GbifVocabularyEntry"
        metadata_url:
          type: string

    GbifMetadataResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/GbifMetadataData"

    InatPlaceResult:
      type: object
      required:
        - id
        - display_name
        - place_type
        - place_type_name
      properties:
        id:
          type: integer
          description: iNaturalist numeric place ID. Use this in taxon_id + place_id queries.
        display_name:
          type: string
          description: Human-readable place name as returned by iNaturalist
        place_type:
          type: integer
          description: iNaturalist numeric place type code
        place_type_name:
          type: string
          description: Human-readable place type (e.g. County, State, Nation)

    InatPlaceData:
      type: object
      properties:
        results:
          type: array
          description: Up to 5 matching places. Applications select the correct one.
          items:
            $ref: "#/components/schemas/InatPlaceResult"
      additionalProperties: false

    InatPlaceResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/InatPlaceData"

    InatConservationStatus:
      type: object
      required:
        - authority
        - status
        - status_name
      properties:
        authority:
          type: string
          description: Assessing authority (e.g. IUCN)
        status:
          type: string
          description: Status code (e.g. LC, VU, EN)
        status_name:
          type: string
          description: Full status name (e.g. Least Concern)

    InatCommonName:
      type: object
      required:
        - name
        - locale
      properties:
        name:
          type: string
        locale:
          type: string
          description: BCP 47 locale code (e.g. en, fr, de)

    InatNativeStatusEntry:
      type: object
      required:
        - status
        - place_name
      properties:
        status:
          type: string
          description: >
            native, introduced, endemic, or similar values as recorded
            by iNaturalist community members for this place
        place_name:
          type: string
          description: Name of the place where this status applies

    InatSpeciesResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"

    InatHistogramResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"

    InatFieldValuesResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"

    InatObservationSummaryRecord:
      type: object
      description: >
        Expanded field subset of a single iNaturalist observation. Follow the uri
        field for the complete record on iNaturalist. Note: nativity data (native,
        introduced, endemic status) is NOT present on observation records — it lives
        in listed_taxa on the taxon record, available via GET /inat/taxa/{id}.
      required:
        - id
        - uri
      properties:
        id:
          type: integer
        uuid:
          type: string
          nullable: true
          description: UUID of the observation
        uri:
          type: string
          description: Canonical URL to the full observation on iNaturalist
        observed_on:
          type: string
          nullable: true
          description: Date the observation was made (YYYY-MM-DD)
        quality_grade:
          type: string
          nullable: true
          description: "research | needs_id | casual"
        obscured:
          type: boolean
          nullable: true
          description: Whether the location has been obscured for this observation
        license_code:
          type: string
          nullable: true
          description: "License code for this observation (e.g. cc-by, cc-by-nc)"
        description:
          type: string
          nullable: true
          description: Observer-provided description text
        tags:
          type: array
          nullable: true
          description: Tags applied to this observation
          items:
            type: string
        taxon_name:
          type: string
          nullable: true
          description: Scientific name (shorthand from taxon.name)
        common_name:
          type: string
          nullable: true
          description: Preferred common name (shorthand from taxon.preferred_common_name)
        taxon:
          type: object
          nullable: true
          description: Taxon sub-object with key fields
          properties:
            id:
              type: integer
            rank:
              type: string
              nullable: true
            iconic_taxon_name:
              type: string
              nullable: true
            default_photo:
              type: object
              nullable: true
              additionalProperties: true
          additionalProperties: true
        place_guess:
          type: string
          nullable: true
          description: Human-readable location string provided by the observer
        location:
          type: string
          nullable: true
          description: "lat,lng decimal string"
        observer:
          type: string
          nullable: true
          description: iNaturalist login of the observer (shorthand from user.login)
        user:
          type: object
          nullable: true
          description: Observer user sub-object
          properties:
            id:
              type: integer
            name:
              type: string
              nullable: true
            login:
              type: string
              nullable: true
          additionalProperties: true
        photo_url:
          type: string
          nullable: true
          description: Medium-size URL of the first photo (shorthand)
        photo_attribution:
          type: string
          nullable: true
          description: License and attribution text for the first photo (shorthand)
        photos:
          type: array
          nullable: true
          description: Full photos array from iNaturalist
          items:
            type: object
            additionalProperties: true
        annotations:
          type: array
          nullable: true
          description: Controlled annotation values on this observation
          items:
            type: object
            additionalProperties: true
        ofvs:
          type: array
          nullable: true
          description: Observer field values (OFVs) on this observation
          items:
            type: object
            additionalProperties: true

    InatObservationSummaryData:
      type: object
      required:
        - total_results
        - page
        - per_page
        - total_pages
        - results
      properties:
        total_results:
          type: integer
          description: Total observations matching the query (iNat API limit is 10,000)
        page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/InatObservationSummaryRecord"

    InatObservationSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"

    InatControlledTermsResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"

    InatControlledTermsForTaxonResponse:
      allOf:
        - $ref: "#/components/schemas/FernsEnvelope"


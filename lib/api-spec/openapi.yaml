        - input_summary
        - output_summary
        - dependencies
        - update_frequency
        - known_limitations
        - metadata_url
      properties:
        source_id:
          type: string
          description: Stable identifier for this service (e.g. bonap-napa, gbif)
        name:
          type: string
          description: Human-readable service name
        knowledge_type:
          type: string
          description: "source_wrapper | derived_synthesis | aggregation | system | vocabulary_reference"
        status:
          type: string
          description: "live | draft | deprecated"
        description:
          type: string
          description: Plain-English description readable by a homeowner or community member
        input_summary:
          type: string
          description: What you send to query this service
        output_summary:
          type: string
          description: What you get back
        dependencies:
          type: array
          items:
            type: string
          description: source_ids this service depends on
        update_frequency:
          type: string
          description: How often the underlying data changes (e.g. live, annual, static)
        known_limitations:
          type: string
          description: Brief honest statement of gaps and caveats
        metadata_url:
          type: string
          description: Link to this service's full /metadata endpoint
        licenses:
          type: array
          items:
            type: string
          description: >
            Whether FERNS has verified that use of this source is explicitly permitted.
            true = permission confirmed; null = not yet evaluated.
        license_notes:
          type: string
          description: >
            Plain-English description of the permission situation for this source.
            Covers license type, access model, and any restrictions on use.
        general_summary:
          type: string
          description: >
            One-paragraph plain-English description of this source suitable for
            non-technical users, agents, and routing decisions.
        technical_details:
          type: string
          description: >
            Technical description of how this source works, including data model,
            method, upstream URL, caching behavior, and known edge cases.


  /usda-plants:
    get:
      operationId: getUsdaPlants
      tags: [usda-plants]
      summary: Look up a species in the USDA PLANTS Database by scientific name
      description: >
        Resolves a scientific name to a USDA symbol via the PlantSearch API, then
        fetches the full PlantProfile. Returns the symbol, canonical name, common name,
        taxonomic rank, nativity status per US region, wetland indicator data, legal
        statuses, taxonomy hierarchy (Ancestors), synonyms, fact sheets, and plant guide
        URLs. Name matches are cached 30 days for hits and 7 days for misses; profiles
        are cached 30 days. Use ?refresh=true to bypass both caches.
      parameters:
        - name: species
          in: query
          required: true
          description: Scientific name (e.g. Asclepias tuberosa)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from USDA PLANTS
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: USDA PLANTS lookup result (check found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsdaPlantsSpeciesResponse"
        "400":
          description: Missing species parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: USDA PLANTS API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usda-plants/profile:
    get:
      operationId: getUsdaPlantsProfile
      tags: [usda-plants]
      summary: Fetch the full USDA PLANTS profile for a known symbol
      description: >
        Fetches the PlantProfile for a known USDA symbol (e.g. ASTU for Asclepias
        tuberosa). Returns the complete raw profile object as returned by the USDA
        PLANTS API. Profiles are cached 30 days. Use ?refresh=true to bypass the cache.
        Use the /usda-plants?species= endpoint to resolve a scientific name to a symbol
        if the symbol is not already known.
      parameters:
        - name: symbol
          in: query
          required: true
          description: USDA PLANTS symbol (e.g. ASTU)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from USDA PLANTS
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Full USDA PLANTS profile for the given symbol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsdaPlantsProfileResponse"
        "400":
          description: Missing symbol parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: USDA PLANTS API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usda-plants/search:
    get:
      operationId: getUsdaPlantsSearch
      tags: [usda-plants]
      summary: Search the USDA PLANTS Database with a text query
      description: >
        Performs a paginated text search against the USDA PLANTS plants-search-results
        endpoint. Supports searching by Scientific Name, Common Name, Symbol, or Family.
        Returns matching records with symbol, common name, family, wetland data, legal
        status, and image info. Search results are not cached — each call hits the USDA
        PLANTS API directly.
      parameters:
        - name: q
          in: query
          required: true
          description: Search text (e.g. Trillium, butterfly milkweed)
          schema:
            type: string
            minLength: 1
        - name: field
          in: query
          required: false
          description: >
            Field to search. One of Scientific Name, Common Name, Symbol, Family.
            Defaults to Scientific Name.
          schema:
            type: string
            enum: [Scientific Name, Common Name, Symbol, Family]
            default: Scientific Name
        - name: page
          in: query
          required: false
          description: 1-based page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Paginated search results from USDA PLANTS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsdaPlantsSearchResponse"
        "400":
          description: Missing q parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: USDA PLANTS API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /usda-plants/metadata:
    get:
      operationId: getUsdaPlantsMetadata
      tags: [usda-plants]
      summary: USDA PLANTS Database service metadata
      description: >
        Returns service identity, access method (api_fetch), attribution, permission
        status, and the full registry entry for the USDA PLANTS Database service.
      responses:
        "200":
          description: USDA PLANTS service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsdaPlantsMetadataResponse"

  /lady-bird-johnson:
    get:
      operationId: getLadyBirdJohnson
      tags: [lady-bird-johnson]
      summary: Verify a Lady Bird Johnson Wildflower Center species profile URL from a USDA Plants symbol
      description: >
        Accepts a USDA Plants symbol (e.g. TRGI for Trillium grandiflorum) and returns a verified
        direct species profile URL at https://www.wildflower.org/plants/result.php?id_plant={SYMBOL}.
        Verification is performed via HTTP GET with redirect:manual and a browser-like User-Agent
        (required — the site returns 403 to generic agents). HTTP 200 = found; 3xx redirect = not_found;
        5xx/network = unverified (not cached). Results are cached in lbj_url_cache (90-day TTL when
        found, 30-day when not_found). Obtain USDA Plants symbols via /usda-plants.
      parameters:
        - name: usda_symbol
          in: query
          required: true
          description: USDA Plants symbol (e.g. TRGI for Trillium grandiflorum). Obtain via /usda-plants.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Lady Bird Johnson profile URL verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LbjUrlCheckResponse"
        "400":
          description: Missing or invalid usda_symbol parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lady-bird-johnson/species-text:
    get:
      operationId: getLadyBirdJohnsonSpeciesText
      tags: [lady-bird-johnson]
      summary: Scrape and return species page text from Lady Bird Johnson Wildflower Center
      description: >
        Fetches and caches botanical prose text from the Lady Bird Johnson Wildflower Center
        (wildflower.org/plants) species profile page identified by a USDA Plants symbol.
        Verification and scraping use a browser-like User-Agent (required — site returns 403
        to generic agents) with redirect:manual to detect not-found responses (3xx redirect).
        Sections extracted include all h3-delimited prose; "Find Seeds or Plants" and
        "Mr. Smarty Plants says" sections are excluded. First call fetches live; subsequent
        calls return the cached text. Use ?refresh=true to force a re-scrape. Returns
        found=false when the symbol is not found on the Wildflower Center site.
        Obtain USDA Plants symbols via /usda-plants.
      parameters:
        - name: usda_symbol
          in: query
          required: true
          description: USDA Plants symbol (e.g. TRGI for Trillium grandiflorum). Obtain via /usda-plants.
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If "true", bypass cache and re-scrape the live page
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Species page text result (found or not-found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LbjSpeciesTextResponse"
        "400":
          description: Missing symbol parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lady-bird-johnson/metadata:
    get:
      operationId: getLadyBirdJohnsonMetadata
      tags: [lady-bird-johnson]
      summary: Lady Bird Johnson Wildflower Center service metadata
      description: >
        Returns service identity, URL verification strategy, cache configuration, attribution, and the
        full registry entry for the Lady Bird Johnson Wildflower Center service.
      responses:
        "200":
          description: Lady Bird Johnson service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotanicalWebRefMetadataResponse"

  /ann-arbor-npn/metadata:
    get:
      operationId: getAnnArborNpnMetadata
      tags: [ann-arbor-npn]
      summary: Ann Arbor Native Plant Nursery service metadata
      description: >
        Returns service identity, current species count, permission status, and the full
        registry entry for The Native Plant Nursery (nativeplant.com, Ann Arbor, MI —
        Greg Vaclavek). Includes known limitations, update frequency, and technical details.
      responses:
        "200":
          description: NPN service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpnMetadataResponse"

  /ann-arbor-npn/species:
    get:
      operationId: getAnnArborNpnSpeciesBulk
      tags: [ann-arbor-npn]
      summary: All Ann Arbor Native Plant Nursery species (bulk)
      description: >
        Returns all ~130 species from The Native Plant Nursery database ordered by Latin
        name. Each record includes ecological attributes (light, moisture, height, flowering
        time, habitat, range within Michigan), nursery pricing, and Cloudinary image URLs
        with captions and kind (photograph / drawing). Returns an empty list if the import
        has not yet been run.
      parameters:
        - name: provenance_verbosity
          in: query
          required: false
          description: Controls provenance verbosity in the response ("full" or "minimal")
          schema:
            type: string
            enum: [full, minimal]
      responses:
        "200":
          description: NPN bulk species list (found=false with empty array before import)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpnSpeciesBulkResponse"

  /ann-arbor-npn/species/{key}:
    get:
      operationId: getAnnArborNpnSpeciesByKey
      tags: [ann-arbor-npn]
      summary: Single NPN species by acronym, Latin name, synonym, or common name
      description: >
        Resolves any NPN name flavor to a species record via the npn_name_aliases index
        (case-insensitive). Accepted inputs: acronym (e.g. LOBSIP), Latin name
        (e.g. "Lobelia spicata"), Greg's Latin synonym, or any common name
        (semicolon/comma-delimited common names are each indexed separately).
        Returns HTTP 404 with found=false when the key does not appear in the alias index.
        The alias index is built during import; 404 is also returned before import has run.
      parameters:
        - name: key
          in: path
          required: true
          description: Acronym, Latin name, synonym, or common name (any capitalisation)
          schema:
            type: string
            minLength: 1
        - name: provenance_verbosity
          in: query
          required: false
          schema:
            type: string
            enum: [full, minimal]
      responses:
        "200":
          description: NPN species record (found=true)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpnSpeciesResponse"
        "400":
          description: Empty key parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Name not found in alias index (found=false)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpnNotFoundResponse"

  /ann-arbor-npn/names:
    get:
      operationId: getAnnArborNpnNames
      tags: [ann-arbor-npn]
      summary: NPN name groups with common_names array and all_accepted_keys for reconciliation
      description: >
        Returns all species as name groups, each containing acronym, latin_name,
        latin_synonym_greg (nullable), common_names (string array, parsed from the
        semicolon/comma-delimited common_name field), and all_accepted_keys (full list
        of lowercase aliases indexed for this species). Designed for cross-source name
        reconciliation against GBIF, USDA PLANTS, or iNaturalist.
      parameters:
        - name: provenance_verbosity
          in: query
          required: false
          schema:
            type: string
            enum: [full, minimal]
      responses:
        "200":
          description: NPN name groups (found=false with empty array before import)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpnNamesResponse"

  /ann-arbor-npn/import:
    post:
      operationId: importAnnArborNpn
      tags: [ann-arbor-npn]
      summary: Trigger NPN import from nativeplant.com (admin-only)
      description: >
        Scrapes nativeplant.com, uploads images to Cloudinary, and populates
        npn_species and npn_name_aliases. Requires the x-admin-secret header.
        Optionally accepts an array of acronyms to re-import a subset of species.
      security:
        - adminSecret: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                acronyms:
                  type: array
                  items:
                    type: string
                  description: Optional subset of acronyms to import; omit to import all
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  queried_at:
                    type: string
                    format: date-time
                  data:
                    type: object
                    properties:
                      speciesUpserted:
                        type: integer
                      aliasesUpserted:
                        type: integer
                      imagesUploaded:
                        type: integer
                      imagesSkipped:
                        type: integer
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            acronym:
                              type: string
                            error:
                              type: string
        "401":
          description: Missing or invalid admin secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    FernsProvenance:
      type: object
      description: >
        Provenance block present on every FERNS API response.
        Identity fields (source_id, fetched_at, method, upstream_url) are always present.
        Text fields (general_summary, technical_details) are conditionally present
        based on the provenance_verbosity query parameter (full|summary|none).
      required:
        - source_id
        - fetched_at
        - method
        - upstream_url
      properties:
        source_id:
          type: string
          description: Stable identifier for this data source (e.g. bonap-napa)
        fetched_at:
          type: string
          format: date-time
          description: When this record was obtained from the source
        method:
          type: string
          description: "How the data was obtained: api_fetch | blob_import | llm_synthesis"
        upstream_url:
          type: string
          description: Where this data came from (API endpoint, file path, or registry entry)
        general_summary:
          type: string
          description: Plain language description readable by a homeowner or community member
        technical_details:
          type: string
          description: >
            Research-grade description: methods, measurement protocols, algorithms,
            citations, and transformations — sufficient for a scientist to evaluate and reproduce
        matched_input:
          type: string
          description: >
            The normalized input that was actually used for this lookup (e.g., the name
            as queried). Present on endpoints that accept a name parameter.

    ColorKeyEntry:
      type: object
      required:
        - code
        - hex_approx
        - hex_is_approximate
        - name
        - description
        - layer
      properties:
        code:
          type: string
          description: Short string identifier for this color entry
        hex_approx:
          type: string
          description: Approximate hex color value derived from visual inspection of BONAP maps
        hex_is_approximate:
          type: boolean
          description: Always true — BONAP does not publish official hex values
        name:
          type: string
          description: BONAP's official status name for this color
        description:
          type: string
          description: Ecological meaning of this color
        layer:
          type: string
          enum: [state_background, county_fill]
          description: Whether this color applies to state backgrounds or county fills

    BonapAttribution:
      type: object
      required:
        - source_name
        - maintainer
        - organization
        - website
        - napa_url
        - citation_napa
        - citation_tdc
        - copyright_notice
      properties:
        source_name:
          type: string
        maintainer:
          type: string
        organization:
          type: string
        website:
          type: string
        napa_url:
          type: string
        citation_napa:
          type: string
        citation_tdc:
          type: string
        copyright_notice:
          type: string

    BonapMapData:
      type: object
      required:
        - map_type_served
        - genus
        - species_stripped
        - status
        - color_key_url
        - color_key_image_url
        - color_key
        - data_vintage
        - permission_granted
        - permission_status
        - attribution
        - cache_status
        - queried_at
      properties:
        map_url:
          type: string
          nullable: true
          description: >
            Direct URL to the PNG image on BONAP's server. Present when status is found.
            Null when not found. Applications display this via an img tag — do not proxy.
        map_type_served:
          type: string
          enum: [county_species, state_species]
        genus:
          type: string
          description: Normalized genus name as used in URL construction
        species:
          type: string
          nullable: true
          description: Normalized species epithet.
        species_stripped:
          type: boolean
          description: True if the caller provided a subspecific epithet that was stripped
        status:
          type: string
          enum: [found, not_found, unverified]
          description: >
            found — URL returned a valid image during cache population.
            not_found — BONAP returned a non-image response for this binomial.
            unverified — URL was returned from cache without re-verification.
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: >
            Direct URL to BONAP's authoritative composite color key GIF image.
            Display this image to show users the complete, pixel-perfect color key.
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
          description: Complete color key for interpreting BONAP maps
        data_vintage:
          type: string
          description: "NAPA maps: December 15, 2014. Color key documentation: February 8, 2024."
        permission_granted:
          type: boolean
          description: >
            Whether FERNS has received written permission from BONAP to reproduce
            and display map materials. Currently false. Applications must surface this field.
        permission_status:
          type: string
          description: >
            Human-readable permission status string. Matches the value from the metadata endpoint.
            Applications should display this when permission_granted is false.
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
        queried_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
          description: >
            Human-readable diagnostic note. Non-null only when status is unverified — explains
            that BONAP's server did not return a definitive response during cache population and
            instructs the caller to retry with ?refresh=true. Null when status is found or not_found.

    BonapMapResponse:
      type: object
      description: Standard FERNS response envelope for BONAP map lookups
      required:
        - source_url
        - found
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
          description: >
            Canonical BONAP page URL for this species or genus.
            Always constructed when possible and returned regardless of whether
            a map was found. Enables 'View on BONAP' links in applications.
        found:
          type: boolean
          description: Whether a BONAP map was found for this query
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/BonapMapData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    BonapMetadataResponse:
      type: object
      required:
        - service_id
        - service_name
        - data_vintage
        - permission_granted
        - permission_status
        - attribution
        - color_key
        - color_key_url
        - color_key_image_url
        - queried_at
      properties:
        service_id:
          type: string
        service_name:
          type: string
        data_vintage:
          type: string
        permission_granted:
          type: boolean
        permission_status:
          type: string
        attribution:
          $ref: "#/components/schemas/BonapAttribution"
        color_key:
          type: array
          items:
            $ref: "#/components/schemas/ColorKeyEntry"
        color_key_url:
          type: string
          description: URL of the BONAP map key reference page
        color_key_image_url:
          type: string
          description: >
            Direct URL to BONAP's authoritative composite color key GIF image.
            Display this image to show users the complete, pixel-perfect color key.
        queried_at:
          type: string
          format: date-time

    GbifSynonymRecord:
      type: object
      required:
        - key
        - canonicalName
        - scientificName
        - rank
        - taxonomicStatus
        - nameType
      properties:
        key:
          type: integer
        canonicalName:
          type: string
        scientificName:
          type: string
        rank:
          type: string
        taxonomicStatus:
          type: string
        nameType:
          type: string
        publishedIn:
          type: string
          nullable: true

    GbifVernacularRecord:
      type: object
      required:
        - vernacularName
        - language
      properties:
        vernacularName:
          type: string
        language:
          type: string
        country:
          type: string
          nullable: true
        source:
          type: string
          nullable: true

    GbifOccurrenceRecord:
      type: object
      required:
        - gbifID
        - decimalLatitude
        - decimalLongitude
        - country
        - basisOfRecord
        - occurrenceStatus
        - gbifOccurrenceUrl
      properties:
        gbifID:
          type: string
        decimalLatitude:
          type: number
        decimalLongitude:
          type: number
        country:
          type: string
        stateProvince:
          type: string
          nullable: true
        county:
          type: string
          nullable: true
        eventDate:
          type: string
          nullable: true
        year:
          type: integer
          nullable: true
        basisOfRecord:
          type: string
        institutionCode:
          type: string
          nullable: true
        datasetName:
          type: string
          nullable: true
        coordinateUncertaintyInMeters:
          type: number
          nullable: true
        occurrenceStatus:
          type: string
        gbifOccurrenceUrl:
          type: string

    GbifMatchData:
      type: object
      required:
        - matchType
        - matched_input
        - source_url
      properties:
        usageKey:
          type: integer
          nullable: true
          description: GBIF backbone usageKey. Null when matchType is NONE.
        canonicalName:
          type: string
          nullable: true
        scientificName:
          type: string
          nullable: true
        rank:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          description: ACCEPTED, SYNONYM, or DOUBTFUL
        accepted_usage_key:
          type: integer
          nullable: true
          description: Present when status is SYNONYM. FERNS addition.
        accepted_canonical_name:
          type: string
          nullable: true
          description: Present when status is SYNONYM. FERNS addition.
        confidence:
          type: integer
          nullable: true
        matchType:
          type: string
          enum: [EXACT, FUZZY, HIGHERRANK, NONE]
        kingdom:
          type: string
          nullable: true
        phylum:
          type: string
          nullable: true
        class_:
          type: string
          nullable: true
          description: GBIF 'class' field (JS reserved word renamed to class_)
        order_:
          type: string
          nullable: true
          description: GBIF 'order' field (JS reserved word renamed to order_)
        family:
          type: string
          nullable: true
        genus:
          type: string
          nullable: true
        species:
          type: string
          nullable: true
        kingdomKey:
          type: integer
          nullable: true
        phylumKey:
          type: integer
          nullable: true
        classKey:
          type: integer
          nullable: true
        orderKey:
          type: integer
          nullable: true
        familyKey:
          type: integer
          nullable: true
        genusKey:
          type: integer
          nullable: true
        speciesKey:
          type: integer
          nullable: true
        source_url:
          type: string
          nullable: true
          description: https://www.gbif.org/species/{usageKey} when usageKey is known
        matched_input:
          type: string
        matched_at:
          type: string
          format: date-time
          nullable: true
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
          nullable: true

    GbifMatchResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GbifMatchData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifReconcileData:
      type: object
      required:
        - usage_key
        - synonyms
        - synonym_count
        - vernacular_names
        - vernacular_name_count
        - synonyms_fetched_at
        - vernacular_fetched_at
      properties:
        usage_key:
          type: integer
        resolved_from_synonym_key:
          type: integer
          nullable: true
          description: The original synonym usageKey if auto-resolution occurred, null otherwise
        synonyms:
          type: array
          items:
            $ref: "#/components/schemas/GbifSynonymRecord"
        synonym_count:
          type: integer
        vernacular_names:
          type: array
          items:
            $ref: "#/components/schemas/GbifVernacularRecord"
        vernacular_name_primary:
          type: string
          nullable: true
        vernacular_name_count:
          type: integer

        synonyms_fetched_at:
          type: string
          format: date-time
        vernacular_fetched_at:
          type: string
          format: date-time

    GbifReconcileResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GbifReconcileData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifOccurrencesData:
      type: object
      required:
        - usage_key
        - geography_mode
        - geography_params
        - occurrence_count
        - recent_occurrences
        - occurrence_last_fetched
        - source_url
      properties:
        usage_key:
          type: integer
        geography_mode:
          type: string
          enum: [countries, continent, bbox]
        geography_params:
          type: string
          description: Serialized geography parameters for display
        occurrence_count:
          type: integer
        occurrence_count_us:
          type: integer
          nullable: true
        recent_occurrences:
          type: array
          items:
            $ref: "#/components/schemas/GbifOccurrenceRecord"
        occurrence_last_fetched:
          type: string
          format: date-time
        source_url:
          type: string
          nullable: true
          description: GBIF occurrence search URL for this taxon and geography
        cache_status:
          type: string
          enum: [hit, miss, bypassed]
          nullable: true

    GbifOccurrencesResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/GbifOccurrencesData"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifSearchCandidate:
      type: object
      required:
        - usageKey
        - canonicalName
        - scientificName
        - rank
        - status
      properties:
        usageKey:
          type: integer
        canonicalName:
          type: string
        scientificName:
          type: string
        rank:
          type: string
        status:
          type: string
        family:
          type: string
          nullable: true
        vernacularName:
          type: string
          nullable: true
        source_url:
          type: string

    GbifSearchResponse:
      type: object
      required:
        - source_url
        - found
        - data
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
        found:
          type: boolean
        data:
          type: object
          nullable: true
          properties:
            query:
              type: string
            candidates:
              type: array
              items:
                $ref: "#/components/schemas/GbifSearchCandidate"
            count:
              type: integer
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    GbifVocabularyEntry:
      type: object
      required:
        - code
        - label
        - description
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string

    GbifMetadataResponse:
      type: object
      required:
        - service_id
        - service_name
        - permission_granted
        - permission_status
        - attribution
        - vocabularies
        - queried_at
        - provenance
      properties:
        service_id:
          type: string
        service_name:
          type: string
        permission_granted:
          type: boolean
        permission_status:
          type: string
        attribution:
          type: object
          properties:
            source_name:
              type: string
            website:
              type: string
            license:
              type: string
            citation:
              type: string
            api_base_url:
              type: string
        vocabularies:
          type: object
          properties:
            basisOfRecord:
              type: array
              items:

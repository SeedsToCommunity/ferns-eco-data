  /lcscg/guide/{guideId}:
    get:
      operationId: getLcscgGuide
      tags: [lcscg]
      summary: Get species list for a single Lake County Seed Collection Guide
      description: >
        Returns all species records for the specified guide (Field Museum Guide ID 1271–1282).
        Each species record includes harvest notes, seed dispersal categories, photo date,
        plant family, and Cloudinary image URLs.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:
        - name: guideId
          in: path
          required: true
          description: Field Museum Guide ID (1271–1282).
          schema:
            type: integer
            minimum: 1271
            maximum: 1282
      responses:
        "200":
          description: Guide detail with species list wrapped in FernsEnvelope (found=false when no matching guide)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
        "400":
          description: Invalid guideId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lcscg/species:
    get:
      operationId: getLcscgSpecies
      tags: [lcscg]
      summary: Search Lake County Seed Collection Guides species by name
      description: >
        Returns species records matching the given name (partial match against scientific_name
        and common_name, case-insensitive) across all 12 guides.
        Results include harvest notes, seed dispersal categories, photo date, plant family,
        guide context, and Cloudinary image URLs.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:
        - name: name
          in: query
          required: true
          description: >
            Scientific or common name to search (partial match, case-insensitive).
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Matching species records wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
        "400":
          description: Missing name parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sources:
    get:
      operationId: getSourcesIndex
      tags: [registry]
      summary: List all registered FERNS Knowledge Services
      description: >
        Returns a summary entry for every registered FERNS Knowledge Service.
        This is the primary discovery endpoint. Each entry contains enough
        information to make a routing decision without a follow-up call to
        individual /metadata endpoints.
      responses:
        "200":
          description: Registry index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesIndexResponse"

  /v1/trust-groups:
    get:
      operationId: getTrustGroups
      tags: [trust-groups]
      summary: List all trust groups
      description: >
        Returns all trust groups with their metadata. Trust groups are curated
        collections of FERNS data sources organized into named, ordered tiers.
        Use GET /v1/trust-groups/{slug}/sources to retrieve the full tiered
        source list for a specific group.
      responses:
        "200":
          description: List of all trust groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustGroupsListResponse"

  /v1/trust-groups/{slug}:
    get:
      operationId: getTrustGroup
      tags: [trust-groups]
      summary: Get a trust group with its tier list
      description: >
        Returns group metadata and its ordered list of tiers. Tiers are ordered
        by position (ascending); lower position = higher trust. To retrieve the
        full source entries assigned to each tier, use
        GET /v1/trust-groups/{slug}/sources.
      parameters:
        - name: slug
          in: path
          required: true
          description: Trust group slug (e.g. default, research-partners)
          schema:
            type: string
      responses:
        "200":
          description: Trust group detail with tier list, or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustGroupDetailResponse"
        "404":
          description: Trust group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/trust-groups/{slug}/sources:
    get:
      operationId: getTrustGroupSources
      tags: [trust-groups]
      summary: Get the tiered source list for a trust group
      description: >
        Returns all sources assigned to a trust group, organized into their
        respective tiers ordered by position (ascending). Each source entry is
        identical in shape to entries returned by GET /v1/sources. This is the
        primary endpoint for resolving which sources to query and in what
        priority order for a given trust context.
      parameters:
        - name: slug
          in: path
          required: true
          description: Trust group slug (e.g. default, research-partners)
          schema:
            type: string
      responses:
        "200":
          description: Tiered source list for the trust group, or not-found response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustGroupSourcesResponse"
        "404":
          description: Trust group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/metadata:
    get:
      operationId: getUniversalFqaMetadata
      tags: [universal-fqa]
      summary: Universal FQA service metadata
      description: >
        Returns service identity, attribution, licenses and license notes, derivation descriptions,
        and the registry entry for the Universal FQA source.
      responses:
        "200":
          description: Service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaMetadataResponse"

  /universal-fqa/get/database:
    get:
      operationId: getUniversalFqaDatabases
      tags: [universal-fqa]
      summary: List all Universal FQA regional databases
      description: >
        Returns all regional FQA databases available on universalfqa.org.
        Each entry contains an id, region name, year, and full citation string.
        The region and citation fields together describe geographic scope, ecoregion
        coverage, institutional source, and methodology — read both in full to
        determine relevance for a given project or location.
      responses:
        "200":
          description: List of all regional databases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaDatabasesResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/get/database/{id}:
    get:
      operationId: getUniversalFqaDatabase
      tags: [universal-fqa]
      summary: Get a full Universal FQA database with all species records
      description: >
        Returns the complete parsed database for the given ID — all species records
        with named fields, plus the database-level summary metrics (total species,
        native/non-native counts, mean C values). On the first request for a given
        database ID, downloads the database from universalfqa.org and persists it to
        the FERNS PostgreSQL cache. Subsequent requests are served from the cache
        (cache_status: hit). Consumers may retrieve the full database and build their
        own in-memory structures without polling FERNS repeatedly.
      parameters:
        - name: id
          in: path
          required: true
          description: Universal FQA database ID (from the databases list)
          schema:
            type: integer
      responses:
        "200":
          description: Full database with all species records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaDatabaseDetailResponse"
        "400":
          description: Invalid database ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/get/database/{id}/inventory:
    get:
      operationId: getUniversalFqaAssessments
      tags: [universal-fqa]
      summary: List public site assessments for a Universal FQA database
      description: >
        Returns all publicly shared site assessments for the specified database.
        Each entry contains the assessment id, name, date, site, and practitioner.
        Assessment county and state are only available in the individual assessment
        detail endpoint — the list does not include location fields.
        Michigan 2014 (ID 50) has 4800+ assessments; Michigan 2024 (ID 267) has 400+.
      parameters:
        - name: id
          in: path
          required: true
          description: Universal FQA database ID
          schema:
            type: integer
      responses:
        "200":
          description: List of public assessments for this database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaAssessmentsResponse"
        "400":
          description: Missing or invalid database_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /universal-fqa/get/inventory/{id}:
    get:
      operationId: getUniversalFqaAssessment
      tags: [universal-fqa]
      summary: Get a single Universal FQA site assessment in full detail
      description: >
        Returns the full detail for a public site assessment: site name, date,
        city/county/state/country, practitioner, which FQA database was used,
        all computed FQI metrics (Total/Native FQI, Adjusted FQI, Mean C, Mean Wetness,
        species richness, physiognomy breakdown, duration breakdown), and the complete
        observed species list with all nine per-species source fields.
        Returns 404 if the assessment does not exist or is not public.
      parameters:
        - name: id
          in: path
          required: true
          description: Universal FQA assessment ID (from the assessments list)
          schema:
            type: integer
      responses:
        "200":
          description: Full assessment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalFqaAssessmentResponse"
        "404":
          description: Assessment not found or not public
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: universalfqa.org API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sources/metadata:
    get:
      operationId: getSourcesMetadata
      tags: [registry]
      summary: Metadata for the FERNS Source Registry service itself
      description: >
        Returns metadata about the registry service itself — its identity,
        descriptions, and its own registry entry. Follows the same envelope
        pattern as all other FERNS /metadata endpoints.
      responses:
        "200":
          description: Registry service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesMetadataResponse"

  /v1/source-relationships:
    get:
      operationId: getSourceRelationships
      tags: [registry]
      summary: List cross-source relationships (overlaps, conflicts, complements)
      description: >
        Returns all documented relationships between FERNS sources — overlaps, conflicts,
        and complementary pairings. Optionally filter by source_id to get only relationships
        involving a specific source. Use this endpoint to understand whether two sources
        double-count data, disagree on terminology, or cover the same domain from different
        methodologies. Individual source metadata does not contain cross-source information;
        this endpoint is the canonical location for all inter-source knowledge.
      parameters:
        - name: source_id
          in: query
          required: false
          description: >
            If provided, returns only relationships where this source_id is one of the two parties.
          schema:
            type: string
      responses:
        "200":
          description: List of source relationships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceRelationshipsResponse"

  /mnfi/metadata:
    get:
      operationId: getMnfiMetadata
      tags: [mnfi]
      summary: MNFI service metadata
      description: >
        Returns service identity, attribution, licenses and license notes, community class
        counts, county coverage, and cache statistics for the Michigan Natural
        Features Inventory (MNFI) service. Also seeds the MNFI entry in the FERNS
        source registry. Use this to populate 'About this data' panels in any
        application displaying MNFI community or county element data.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      responses:
        "200":
          description: MNFI service metadata wrapped in FernsEnvelope
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"

  /mnfi/communities:
    get:
      operationId: getMnfiCommunities
      tags: [mnfi]
      summary: List MNFI natural community types
      description: >
        Returns all Michigan Natural Features Inventory (MNFI) natural community
        types. Optionally filter by community class, group, or name substring
        (case-insensitive ILIKE match). All data is served from FERNS's local
        database seeded from the MNFI website — no upstream API call is made at
        query time. Returns community records sorted by class and name.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:
        - name: class
          in: query
          required: false
          description: Filter by community class (substring match, e.g. Terrestrial)
          schema:
            type: string
        - name: group
          in: query
          required: false
          description: Filter by community group (substring match, e.g. Forest)
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Filter by community name (substring match, e.g. oak savanna)
          schema:
            type: string
      responses:
        "200":
          description: List of MNFI natural community types wrapped in FernsEnvelope (found=false when no matches)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"

  /mnfi/communities/{id}:
    get:
      operationId: getMnfiCommunity
      tags: [mnfi]
      summary: Get a single MNFI community by ID or slug
      description: >
        Returns the full profile for a single MNFI natural community type,
        including description, acreage estimates, and all characteristic plants
        grouped by life form. The {id} path parameter accepts either the numeric
        community_id (e.g. 1234) or the URL slug (e.g. southern-dry-chestnut-oak-forest).
        Plant lists are included inline — characteristic_plants.by_life_form groups
        species by life form (tree, shrub, herb, etc.).
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric community_id or URL slug for the community
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Community profile wrapped in FernsEnvelope (found=false when no community matches the id or slug)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
        "404":
          description: No community found with the given id or slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mnfi/communities/{id}/plants:
    get:
      operationId: getMnfiCommunityPlants
      tags: [mnfi]
      summary: Get characteristic plants for an MNFI community
      description: >
        Returns the characteristic plant list for an MNFI natural community,
        grouped by life form (tree, shrub, herb, graminoid, vine, etc.). The
        {id} path parameter accepts either the numeric community_id or the URL slug.
        This is the same plant data included inline in the community detail endpoint,
        exposed as a dedicated endpoint for applications that only need plant lists.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric community_id or URL slug for the community
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Plant list grouped by life form wrapped in FernsEnvelope (found=false when no community matches)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
        "404":
          description: No community found with the given id or slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mnfi/county-elements:
    get:
      operationId: getMnfiCountyElements
      tags: [mnfi]
      summary: Get MNFI significant natural features for a Michigan county
      description: >
        Returns MNFI Element Occurrence records for a given Michigan county.
        These records document where significant natural features (rare species,
        natural communities) have been observed. The county parameter is required;
        all 83 Michigan county names are accepted (case-insensitive). Optionally
        filter to only species or community element types with the type parameter.
        Data is served from FERNS's local database seeded from the MNFI county
        element download — no upstream API call at query time.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:
        - name: county
          in: query
          required: true
          description: >
            Michigan county name (e.g. Washtenaw, Leelanau). Case-insensitive.
            All 83 Michigan county names are accepted.
          schema:
            type: string
            minLength: 1
        - name: type
          in: query
          required: false
          description: >
            Filter by element type. Must be 'species' or 'community' when provided.
            When omitted, both types are returned.
          schema:
            type: string
            enum: [species, community]
      responses:
        "200":
          description: County element occurrences wrapped in FernsEnvelope (found=false when county has no element data)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FernsEnvelope"
        "400":
          description: Missing county parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /natureserve/metadata:
    get:
      operationId: getNatureserveMetadata
      tags: [natureserve]
      summary: NatureServe service metadata
      description: >
        Returns service identity, attribution, licenses and license notes, cache statistics,
        and the full registry entry for the NatureServe Explorer service. Use this
        to populate 'About this data' panels in any application displaying NatureServe
        conservation status or ecosystem data. Also seeds the NatureServe entry in
        the FERNS source registry.
      responses:
        "200":
          description: NatureServe service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NatureserveMetadataResponse"

  /natureserve/speciesSearch:
    get:
      operationId: getNatureserveSpecies
      tags: [natureserve]
      summary: Look up species conservation status from NatureServe Explorer
      description: >
        Queries NatureServe Explorer for conservation status data for a given
        scientific name, optionally scoped to a US state. Returns global rank
        (G-rank), national rank (N-rank), state rank (S-rank), IUCN category,
        federal status, state status, and a direct NatureServe Explorer URL for
        the species. Ranks follow NatureServe standard notation (e.g. G3, N2N3,
        S1). State rank is derived from NatureServe S-rank and reflects rarity
        status — it is not a formal statutory state listing. Results cached 30
        days per name+state combination.
      parameters:
        - name: name
          in: query
          required: true
          description: Scientific name to look up (e.g. Asclepias tuberosa)
          schema:
            type: string
            minLength: 1
        - name: state
          in: query
          required: false
          description: >
            Two-letter US state code to scope the state rank (e.g. MI, WI, OH).
            Defaults to MI (Michigan) when omitted. Must be a valid 2-letter code.
          schema:
            type: string
            default: MI
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from NatureServe Explorer
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Conservation status result (found or not-found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NatureserveSpeciesResponse"
        "400":
          description: Missing or invalid name or state parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: NatureServe Explorer API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /natureserve/search:
    get:
      operationId: getNatureserveSearch
      tags: [natureserve]
      summary: Search NatureServe by record type (ecosystems, species, communities)
      description: >
        FERNS GET wrapper over the upstream NatureServe Explorer POST /api/data/search endpoint.
        Accepts a free-text query and a recordType filter; translates them into a POST body
        (criteriaType: combined, recordTypeCriteria array, textCriteria quickSearch) and caches
        the result so repeated queries are served without hitting the upstream API.
        Valid recordType values and what they return:
        ECOSYSTEM — NatureServe Ecological Systems and community types (global rank, US national rank, concept description, NatureServe Explorer URL);
        SPECIES — animal and plant species (prefer /natureserve/speciesSearch for richer per-species conservation status detail including state rank and federal listing);
        COMMUNITY — plant communities;
        GROUP — element groups;
        ASSOCIATION — plant associations.
        Results are returned in data.ecosystems regardless of recordType (field name reflects the
        primary use case; records for other recordType values are shaped identically).
        Results are cached 7 days per query+recordType+limit+page combination.
      parameters:
        - name: q
          in: query
          required: true
          description: Search text (e.g. oak savanna, tallgrass prairie, Platanthera leucophaea)
          schema:
            type: string
            minLength: 1
        - name: recordType
          in: query
          required: false
          description: >
            Type of records to return (default: ECOSYSTEM).
            ECOSYSTEM — ecological systems and community types;
            SPECIES — animal and plant species;
            COMMUNITY — plant communities;
            GROUP — element groups;
            ASSOCIATION — plant associations.
          schema:
            type: string
            enum: [ECOSYSTEM, SPECIES, COMMUNITY, GROUP, ASSOCIATION]
            default: ECOSYSTEM
        - name: limit
          in: query
          required: false
          description: Number of results per page (1–50, default 10)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: page
          in: query
          required: false
          description: Zero-indexed page number (default 0)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: refresh
          in: query
          required: false
          description: If true, bypasses cache and fetches fresh from NatureServe Explorer
          schema:
            type: boolean
            default: false
        - name: provenance_verbosity
          in: query
          required: false
          description: >
            Controls how much provenance text is returned. full (default) returns both
            general_summary and technical_details; summary returns general_summary only;
            none omits both.
          schema:
            type: string
            enum: [full, summary, none]
      responses:
        "200":
          description: Search results (found=false when no matching records returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NatureserveSearchResponse"
        "400":
          description: Missing or invalid q or recordType parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: NatureServe Explorer API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gobotany:
    get:
      operationId: getGobotany
      tags: [gobotany]
      summary: Look up a Go Botany species page URL
      description: >
        Constructs and validates the Go Botany (Native Plant Trust) species page URL
        for a given scientific name. The URL is constructed from the genus and species
        epithet and validated with a live HTTP GET request (HTTP 200 = found). Results
        are cached 7 days. The species parameter must be a binomial name (genus + epithet);
        partial names return 400.
      parameters:
        - name: species
          in: query
          required: true
          description: >
            Binomial scientific name (e.g. Acer rubrum). Genus and species epithet required.
            Both components must contain only letters.
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: URL lookup result (found or not-found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotanicalWebRefResponse"
        "400":
          description: Missing or invalid species parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gobotany/metadata:
    get:
      operationId: getGobotanyMetadata
      tags: [gobotany]
      summary: Go Botany service metadata
      description: >
        Returns service identity, URL construction strategy, attribution, and the
        full registry entry for the Go Botany (Native Plant Trust) service.
      responses:
        "200":
          description: Go Botany service metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotanicalWebRefMetadataResponse"

  /gobotany/species-text:
    get:
      operationId: getGobotanySpeciesText
      tags: [gobotany]
      summary: Scrape and return species page text from Go Botany
      description: >
        Fetches and caches botanical prose text from the Go Botany (Native Plant Trust)
        species detail page. The URL is constructed directly from the binomial name.
        Sections returned include Facts, Habitat, and Characteristics. First call
        scrapes live; subsequent calls return the cached text. Use ?refresh=true to
        force a re-scrape.
      parameters:
        - name: species
          in: query
          required: true
          description: Binomial scientific name (e.g. Acer rubrum)
          schema:
            type: string
            minLength: 1
        - name: refresh
          in: query
          required: false
          description: If "true", bypass cache and re-scrape the live page
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Species page text result (found or not-found — check the found field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeciesTextResponse"
        "400":
          description: Missing or malformed species parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /google-images:
    get:
      operationId: getGoogleImages
      tags: [google-images]
      summary: Construct a Google Images search URL for a species
      description: >
        Constructs a Google Images search URL for a given scientific name. This
        endpoint always returns found=true and a direct Google Images URL —
        no validation is performed. The URL is constructed from the species
        parameter and is not cached. Useful for quickly providing a visual
        reference link without requiring an image database.
        Response is wrapped in the FERNS Response Envelope (FernsEnvelope).
      parameters:

                name:
                  type: string
            tiers:
              type: array
              items:
                $ref: "#/components/schemas/TrustTierWithSources"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    NpnImage:
      type: object
      description: A single image associated with an NPN species record.
      required: [position, url, caption, kind]
      properties:
        position:
          type: integer
          description: 1-based position of this image in the species gallery
        url:
          type: string
          description: Cloudinary CDN URL (or original nativeplant.com URL as fallback)
        caption:
          type: string
          description: Image caption from the source page (may be empty string)
        kind:
          type: string
          enum: [photograph, drawing]
          description: >
            Inferred from caption text: "pen & ink" or "drawing" → drawing; else photograph

    NpnSpeciesRecord:
      type: object
      description: A single species record from The Native Plant Nursery database.
      required: [acronym, latin_name, common_name, images, source_url, scraped_at]
      properties:
        acronym:
          type: string
          description: Primary key — 4–7 character code (e.g. LOBSIP). Carex uses CX prefix.
        latin_name:
          type: string
        latin_synonym_greg:
          type: string
          nullable: true
          description: >
            Greg Vaclavek's Latin synonym. Known quirk: GENAND has "Closed Gentian"
            (a common name) in this field.
        common_name:
          type: string
          description: Raw common name string (may contain ; and , separators)
        light:
          type: string
          nullable: true
        moisture:
          type: string
          nullable: true
        height:
          type: string
          nullable: true
        flowering_time:
          type: string
          nullable: true
        habitat:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        range_michigan:
          type: array
          items:
            type: string
          nullable: true
          description: County or region strings within Michigan
        npn_price_sizes:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/NpnImage"
        source_url:
          type: string
        scraped_at:
          type: string
          format: date-time

    NpnSpeciesResponse:
      type: object
      description: Single NPN species lookup response (found=true, HTTP 200).
      required: [found, queried_at, source_url, provenance]
      properties:
        found:
          type: boolean
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true
          $ref: "#/components/schemas/NpnSpeciesRecord"

    NpnNotFoundResponse:
      type: object
      description: >
        Response when a name key is not in the alias index (HTTP 404). found=false.
      required: [found, queried_at, source_url, provenance]
      properties:
        found:
          type: boolean
          example: false
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true

    NpnSpeciesBulkResponse:
      type: object
      description: Bulk NPN species list response.
      required: [found, queried_at, source_url, provenance, data]
      properties:
        found:
          type: boolean
          description: false when the table is empty (import not yet run)
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          type: object
          required: [species_count, species]
          properties:
            species_count:
              type: integer
            species:
              type: array
              items:
                $ref: "#/components/schemas/NpnSpeciesRecord"

    NpnNameGroup:
      type: object
      description: Name group entry for a single NPN species.
      required: [acronym, latin_name, common_names, all_accepted_keys]
      properties:
        acronym:
          type: string
        latin_name:
          type: string
        latin_synonym_greg:
          type: string
          nullable: true
        common_names:
          type: array
          items:
            type: string
          description: Parsed segments (split on ; and , from common_name)
        all_accepted_keys:
          type: array
          items:
            type: string
          description: All lowercase aliases for this species

    NpnNamesResponse:
      type: object
      description: NPN name groups for cross-source reconciliation.
      required: [found, queried_at, source_url, provenance, data]
      properties:
        found:
          type: boolean
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          type: object
          required: [species_count, name_groups]
          properties:
            species_count:
              type: integer
            name_groups:
              type: array
              items:
                $ref: "#/components/schemas/NpnNameGroup"

    NpnMetadataResponse:
      type: object
      description: Metadata response for the Ann Arbor Native Plant Nursery source.
      required: [service_id, service_name, permission_granted, permission_status, species_count, registry_entry, queried_at, provenance]
      properties:
        service_id:
          type: string
          example: ann-arbor-npn
        service_name:
          type: string
        permission_granted:
          type: boolean
        permission_status:
          type: string
        species_count:
          type: integer
        registry_entry:
          type: object
          additionalProperties: true
        queried_at:
          type: string
          format: date-time
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    SpeciesTextResponse:
      type: object
      description: >
        Response shape for species page text scraping endpoints. Returned by
        /gobotany/species-text, /illinois-wildflowers/species-text,
        /minnesota-wildflowers/species-text, /missouri-plants/species-text,
        and /prairie-moon/species-text.
      required:
        - found
        - queried_at
        - cache_status
      properties:
        found:
          type: boolean
          description: True if the species page was found and text was extracted.
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
          description: The API endpoint URL that served this response.
        cache_status:
          type: string
          enum: [hit, miss, not_in_species_list]
          description: >
            "hit" — returned from cache. "miss" — live scrape performed and cached.
            "not_in_species_list" — species URL not in the imported species list;
            scrape skipped.
        fetch_error:
          type: string
          description: >
            Present only when a transient upstream error (network failure,
            timeout, 5xx) prevented the scrape. The result was NOT cached
            in this case and the next call will retry the live request.
        scraped_at:
          type: string
          format: date-time
          description: Timestamp of when the text was originally scraped.
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true
          type: object
          description: Present when found=true. Null when not found.
          properties:
            species:
              type: string
              description: The species name as queried.
            url:
              type: string
              description: The page URL that was scraped.
            sections:
              type: object
              nullable: true
              additionalProperties:
                type: string
              description: >
                Labeled prose sections extracted from the page (e.g.
                Description, Cultivation, Facts, Habitat). Keys are section
                names, values are plain text content.
            full_text:
              type: string
              nullable: true
              description: >
                All sections concatenated as Label-colon-text blocks, separated by double newlines.

    LbjUrlCheckResponse:
      type: object
      description: >
        Response from /lady-bird-johnson — profile URL verification result keyed by USDA Plants symbol.
      required:
        - found
        - queried_at
      properties:
        found:
          type: boolean
          description: True when HTTP 200 returned for the profile URL (status="found").
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          type: object
          properties:
            usda_symbol:
              type: string
              description: USDA Plants symbol (uppercased).
            profile_url:
              type: string
              nullable: true
              description: Direct profile URL when found; null when not_found or unverified.
            status:
              type: string
              enum: [found, not_found, unverified]
              description: >
                "found" — HTTP 200 returned. "not_found" — 3xx redirect or 4xx returned.
                "unverified" — 5xx or network error; result not cached.
            found:
              type: boolean
              description: True when status is "found".
            http_status:
              type: integer
              nullable: true
              description: HTTP status code returned by the verification request.
            validation_method:
              type: string
              description: Always "http_get_manual_redirect" for this endpoint.
            verified_at:
              type: string
              format: date-time
              nullable: true
              description: >
                Timestamp when the verification HTTP request was made.
                Null when status is "unverified" (network/5xx error prevented caching).
            cache_hit:
              type: boolean
              description: True if the result was served from lbj_url_cache.

    LbjSpeciesTextResponse:
      type: object
      description: >
        Response from /lady-bird-johnson/species-text — scraped species page text keyed by USDA Plants symbol.
      required:
        - found
        - queried_at
        - cache_status
      properties:
        found:
          type: boolean
          description: True if the species page was found and text was extracted.
        queried_at:
          type: string
          format: date-time
        source_url:
          type: string
        cache_status:
          type: string
          enum: [hit, miss]
          description: >
            "hit" — returned from species_page_text_cache. "miss" — live fetch performed.
        fetch_error:
          type: string
          description: >
            Present only when a transient upstream error prevented the scrape. Not cached.
        scraped_at:
          type: string
          format: date-time
          description: Timestamp of when the text was originally scraped.
        provenance:
          $ref: "#/components/schemas/FernsProvenance"
        data:
          nullable: true
          type: object
          description: Present when found=true. Null when not found.
          properties:
            usda_symbol:
              type: string
              description: USDA Plants symbol (uppercased).
            url:
              type: string
              description: The profile URL that was scraped.
            sections:
              type: object
              nullable: true
              additionalProperties:
                type: string
              description: >
                Labeled prose sections extracted from the page (h3-delimited).
                "Find Seeds or Plants" and "Mr. Smarty Plants says" sections are excluded.
            full_text:
              type: string
              nullable: true
              description: All sections concatenated as Label-colon-text blocks, separated by double newlines.

    BotanicalWebRefResponse:
      type: object
      description: >
        Standard response shape for botanical web reference source lookups
        (gobotany, google-images, illinois-wildflowers, minnesota-wildflowers,
        missouri-plants, prairie-moon, usda-plants).
      required:
        - found
        - queried_at
      properties:
        found:
          type: boolean
          description: >
            True if a direct species page URL was resolved. False for sources
            that cannot resolve a profile URL (usda-plants),

        - description
        - technical_note
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        source_id_a:
          type: string
          description: One of the two source IDs (lexically smaller of the pair)
        source_id_b:
          type: string
          description: The other source ID (lexically larger of the pair)
        relationship_type:
          type: string
          enum: [overlap, conflict, complements, supersedes]
          description: Nature of the relationship between the two sources
        scope:
          type: string
          description: >
            Domain in which the relationship applies. One of: taxonomy, occurrence_counts,
            c_values, conservation_ranks, geographic_coverage, terminology, seed_harvest,
            community_classification, occurrence.
        severity:
          type: string
          enum: [blocking, cautionary, informational]
          description: >
            blocking — must account for this before combining these sources;
            cautionary — awareness required, may cause errors if ignored;
            informational — useful context, no required action.
        description:
          type: string
          description: Plain-English description of the relationship for agents and non-technical users
        technical_note:
          type: string
          description: Implementation-level detail for developers and researchers
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time


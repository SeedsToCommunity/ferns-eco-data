          $ref: "#/components/schemas/FernsProvenance"

    MifloraImageRecord:
      type: object
      description: >
        A single image record from the Michigan Flora allimage_info endpoint,
        enriched with constructed absolute image_url and thumbnail_url fields.
      required:
        - image_id
        - image_url
        - thumbnail_url
      properties:
        image_id:
          description: Michigan Flora internal image ID
          oneOf:
            - type: integer
            - type: string
        image_name:
          type: string
          nullable: true
          description: Short descriptive name for the image (e.g. "flowers", "fruit")
        caption:
          type: string
          nullable: true
          description: Caption text from Michigan Flora for this image
        photographer:
          type: string
          nullable: true
          description: Photographer credit for this image
        image_url:
          type: string
          description: >
            Absolute URL to the full-size image on Michigan Flora's server.
            Constructed as: https://michiganflora.net/static/species_images/_pid_{plant_id}/{image_id}.jpg
        thumbnail_url:
          type: string
          description: >
            Absolute URL to the thumbnail image on Michigan Flora's server.
            Constructed as: https://michiganflora.net/static/species_images/_pid_{plant_id}/thumb_{image_id}.jpg

    MifloraImagesResponse:
      type: object
      description: >
        FERNS envelope for Michigan Flora image gallery.
        data is the array of image records from allimage_info, each enriched with
        constructed absolute image_url and thumbnail_url. Cached permanently (no TTL).
      required:
        - source_url
        - found
        - cache_status
        - queried_at
        - provenance
      properties:
        source_url:
          type: string
          nullable: true
          description: Michigan Flora species page URL. Null when species not found.
        found:
          type: boolean
          description: Whether images were found for this species in Michigan Flora
        cache_status:
          type: string
          enum: [hit, miss, error]
        queried_at:
          type: string
          format: date-time
        data:
          nullable: true
          description: >
            Array of image records from Michigan Flora allimage_info, each enriched with
            image_url and thumbnail_url. Null when found is false.
          type: array
          items:
            $ref: "#/components/schemas/MifloraImageRecord"
        provenance:
          $ref: "#/components/schemas/FernsProvenance"

    MifloraSpeciesRecord:
      type: object
      description: A single species record from the Michigan Flora flora_search_sp endpoint.
      required:
        - plant_id
        - scientific_name
        - common_name
      properties:
        plant_id:
          type: integer
          description: Michigan Flora internal plant ID
        scientific_name:
          type: string
          description: Scientific name of the species
        c:
          type: string
          nullable: true
          description: Coefficient of Conservatism (0–10, or null if not assigned)
        st:
          type: string
          nullable: true
          description: State status code (T=threatened, E=endangered, X=probably extirpated, etc.)
        w:
          type: number
          nullable: true
          description: Coefficient of Wetness (-5 to +5)
        wet:
          type: string
          nullable: true
          description: Wetland indicator status code (OBL/FACW/FAC/FACU/UPL)
        phys:
          type: string
          nullable: true
          description: Physiognomy code (e.g. Wt, Sh, Fo, Gr)
        na:
          type: string
          nullable: true
          description: Native status (N=native, A=adventive/non-native)
        family_name:
          type: string
          nullable: true
          description: Plant family name
        author:
          type: string
          nullable: true
          description: Taxonomic authority
        acronym:
          type: string
          nullable: true
          description: Short species code used in Michigan Flora
        common_name:
          type: array
          items:
            type: string
          description: Array of common names for this species


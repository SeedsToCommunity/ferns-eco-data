      summary: Look up ecological systems from NatureServe Explorer
      description: >
        Queries NatureServe Explorer for ecological systems matching a name or
        description. Returns a list of matching NatureServe ecological system
        records including NatureServe identifier, name, and classification details.
        Results cached 30 days per query string. Useful for identifying NatureServe
        ecosystem types corresponding to MNFI natural community types or other
